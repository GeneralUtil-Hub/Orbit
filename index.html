<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter Workspace Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #fff;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .slash-menu-enter {
            animation: slideIn 0.1s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(4px) scale(0.99); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .block-textarea {
            transition: height 0.05s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
        }

        .whiteboard-canvas {
            touch-action: none;
            cursor: crosshair;
            background-color: #ffffff;
            display: block;
        }

        .playground-preview {
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }

        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div id="app" class="flex h-screen w-full">
        <!-- Hidden Inputs for Uploads -->
        <input type="file" id="cover-upload-input" class="hidden" accept="image/*" onchange="handleCoverFile(this)" />
        <input type="file" id="block-image-upload-input" class="hidden" accept="image/*" onchange="handleBlockImageFile(this)" />

        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 flex flex-col bg-[#fbfbfa] border-r border-gray-200 transition-all duration-300 shrink-0">
            <div class="p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 font-bold text-sm text-gray-800">
                        <div class="w-6 h-6 bg-black rounded flex items-center justify-center text-white text-[10px]">P</div>
                        Puter Docs
                    </div>
                    <button onclick="toggleSidebar()" class="hover:bg-gray-200 p-1 rounded transition-colors">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="relative">
                    <i data-lucide="search" class="absolute left-2.5 top-2.5 text-gray-400 w-3.5 h-3.5"></i>
                    <input 
                        type="text"
                        oninput="handleSearch(this.value)"
                        class="w-full bg-gray-200/50 border-none outline-none rounded-lg py-2 pl-8 pr-3 text-xs focus:bg-white focus:ring-1 focus:ring-gray-200 transition-all"
                        placeholder="Search pages..."
                    />
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-2 space-y-4 scrollbar-hide">
                <div id="favorites-section">
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Favorites</div>
                    <div id="favorites-list"></div>
                </div>

                <div>
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest flex justify-between items-center group">
                        Private
                        <button onclick="addPage()" class="p-0.5 hover:bg-gray-200 rounded transition-opacity">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <div id="pages-list"></div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-100 space-y-2">
                <button class="w-full flex items-center gap-2 px-3 py-2 text-xs text-gray-500 hover:bg-gray-200 rounded transition-colors">
                    <i data-lucide="settings" class="w-3.5 h-3.5"></i> Settings
                </button>
                <button onclick="addPage()" class="w-full flex items-center gap-2 px-3 py-2 text-xs text-blue-600 hover:bg-blue-50 rounded transition-colors font-medium">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Page
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full bg-white relative overflow-hidden">
            <button id="menu-btn" onclick="toggleSidebar()" class="hidden absolute top-4 left-4 z-40 p-2 bg-white/50 backdrop-blur rounded shadow-sm border border-gray-100 hover:bg-white transition-all">
                <i data-lucide="menu" class="w-4 h-4"></i>
            </button>

            <!-- Top Header Bar -->
            <div class="h-11 border-b border-gray-50 flex items-center justify-between px-6 shrink-0 z-20 bg-white/80 backdrop-blur-md">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                    <span id="header-icon">🚀</span>
                    <span id="header-title" class="font-medium text-gray-700 truncate max-w-[200px]">Workspace</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleActiveFavorite()" id="favorite-btn" class="p-1.5 rounded hover:bg-gray-100 transition-colors">
                        <i data-lucide="star" class="w-4 h-4"></i>
                    </button>
                    <button class="text-xs font-semibold text-gray-500 hover:bg-gray-100 px-3 py-1.5 rounded transition-all">Share</button>
                    <button class="p-1.5 hover:bg-gray-100 rounded text-gray-400">
                        <i data-lucide="more-horizontal" class="w-4.5 h-4.5"></i>
                    </button>
                </div>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto scrollbar-hide bg-white" id="main-scroll-container">
                <div class="relative h-64 group overflow-hidden">
                    <img id="page-cover" src="" alt="Cover" class="w-full h-full object-cover transition-all duration-700" />
                    <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="absolute bottom-4 right-8 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                        <button onclick="document.getElementById('cover-upload-input').click()" class="bg-white/90 backdrop-blur px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded border border-gray-200 shadow-sm hover:bg-white transition-all flex items-center gap-2">
                            <i data-lucide="upload" class="w-3 h-3"></i> Upload Banner
                        </button>
                        <button onclick="changeCover()" class="bg-white/90 backdrop-blur px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded border border-gray-200 shadow-sm hover:bg-white transition-all">
                            Random
                        </button>
                    </div>
                </div>

                <div class="max-w-4xl mx-auto px-12 lg:px-24">
                    <div class="mt-[-45px] mb-12 relative z-10 group">
                        <div class="relative inline-block">
                            <div id="page-icon" onclick="toggleEmojiPicker(event)" class="text-7xl cursor-pointer hover:bg-gray-100 rounded-2xl p-2 transition-all active:scale-95 select-none bg-white shadow-sm border border-gray-100">
                                🚀
                            </div>
                            <div id="emoji-picker" class="hidden absolute top-full left-0 mt-2 p-3 bg-white border border-gray-200 rounded-2xl shadow-2xl z-50 w-72">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 px-1">Icons</div>
                                <div class="grid grid-cols-5 gap-1" id="emoji-grid"></div>
                            </div>
                        </div>
                        <input 
                            id="main-title-input"
                            oninput="updatePageTitle(this.value)"
                            class="w-full text-5xl font-black border-none outline-none mt-6 placeholder-gray-100 tracking-tight"
                            placeholder="Untitled"
                        />
                        <div class="flex gap-4 mt-6 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-600 transition-colors">
                                <i data-lucide="smile" class="w-3.5 h-3.5"></i> Comment
                            </button>
                            <button class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-600 transition-colors">
                                <i data-lucide="clock" class="w-3.5 h-3.5"></i> History
                            </button>
                        </div>
                    </div>

                    <!-- Editor Area -->
                    <div id="editor-blocks" class="space-y-2 pb-24">
                        <!-- Blocks injected here -->
                    </div>

                    <!-- Bottom Empty Click Area -->
                    <div id="bottom-click-area" class="h-96 cursor-text" onclick="focusNewBlockAtBottom()"></div>
                </div>
            </div>

            <!-- Floating Footer -->
            <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 bg-white/90 backdrop-blur-md px-6 py-3 rounded-2xl border border-gray-200 shadow-2xl z-50">
                <div class="flex items-center gap-4 text-xs font-semibold text-gray-500">
                    <div class="flex items-center gap-2 px-2 py-1 rounded bg-blue-50 text-blue-600">
                        <i data-lucide="monitor" class="w-3.5 h-3.5"></i> Puter Cloud
                    </div>
                    <div class="w-px h-4 bg-gray-200"></div>
                    <button class="hover:text-black flex items-center gap-1" onclick="addPage()">+ New Page</button>
                    <button class="hover:text-black flex items-center gap-1" onclick="alert('Help: Type / for commands')">Help</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Slash Menu -->
    <div id="slash-menu" class="hidden fixed z-50 w-72 bg-white border border-gray-200 rounded-xl shadow-2xl overflow-hidden slash-menu-enter">
        <div class="p-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50">Add Blocks</div>
        <div id="slash-menu-items" class="max-h-96 overflow-y-auto scrollbar-hide"></div>
    </div>

    <script>
        // --- State Management ---
        const DEFAULT_COVERS = [
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000',
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&q=80&w=2000',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2000'
        ];

        const EMOJI_LIST = ['🚀', '🏗️', '📄', '💡', '🎨', '📅', '📝', '🛠️', '🌐', '📊', '💻', '⚡', '📦', '🔥', '📚', '🏠', '🎯', '✨', '🌍', '🍕'];

        const STORAGE_KEY = 'puter_workspace_v3';

        let state = {
            pages: [
                {
                    id: '1',
                    title: 'Quickstart Guide',
                    icon: '🚀',
                    isFavorite: true,
                    cover: DEFAULT_COVERS[0],
                    blocks: [
                        { id: 'b1', type: 'h1', content: 'Notion + Puter Workspace' },
                        { id: 'b2', type: 'callout', content: 'Welcome to your professional workspace. Combine notes with live code and drawing tools.' },
                        { id: 'b3', type: 'h2', content: 'Interactive Playground' },
                        { id: 'b4', type: 'playground', content: '<h1>Hello World</h1>\n<p>Try editing me!</p>', css: 'p { color: #3b82f6; font-weight: bold; }' },
                        { id: 'b5', type: 'divider' },
                        { id: 'b6', type: 'h2', content: 'Drawing Board' },
                        { id: 'b7', type: 'whiteboard', content: '' },
                    ]
                }
            ],
            activePageId: '1',
            sidebarOpen: true,
            searchQuery: '',
            terminalHistory: [
                { type: 'output', content: 'Puter OS v2.5.0 Connected.' }
            ]
        };

        let currentImageBlockId = null;

        // --- Core Functions ---

        function init() {
            loadState();
            renderSidebar();
            renderActivePage();
            setupEmojiPicker();
            setupSlashMenu();
            lucide.createIcons();
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.pages = parsed.pages;
                    state.activePageId = parsed.activePageId;
                    state.terminalHistory = parsed.terminalHistory || state.terminalHistory;
                } catch (e) { console.error(e); }
            }
        }

        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            const sb = document.getElementById('sidebar');
            const mb = document.getElementById('menu-btn');
            sb.style.width = state.sidebarOpen ? '256px' : '0px';
            mb.classList.toggle('hidden', state.sidebarOpen);
        }

        function handleSearch(val) {
            state.searchQuery = val;
            renderSidebar();
        }

        function addPage() {
            const newId = 'p' + Date.now();
            state.pages.push({
                id: newId,
                title: 'New Page',
                icon: '📄',
                isFavorite: false,
                cover: DEFAULT_COVERS[Math.floor(Math.random() * DEFAULT_COVERS.length)],
                blocks: [{ id: 'b' + Date.now(), type: 'h1', content: '' }]
            });
            state.activePageId = newId;
            saveState();
            renderSidebar();
            renderActivePage();
            document.getElementById('main-title-input').focus();
        }

        function setActivePage(id) {
            state.activePageId = id;
            saveState();
            renderSidebar();
            renderActivePage();
            document.getElementById('main-scroll-container').scrollTop = 0;
        }

        function toggleActiveFavorite() {
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page) {
                page.isFavorite = !page.isFavorite;
                saveState();
                renderSidebar();
                renderActivePage();
            }
        }

        function updatePageTitle(val) {
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page) {
                page.title = val;
                document.getElementById('header-title').innerText = val || 'Untitled';
                saveState();
                clearTimeout(window.sidebarUpdateTimer);
                window.sidebarUpdateTimer = setTimeout(renderSidebar, 200);
            }
        }

        function changeCover() {
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page) {
                page.cover = DEFAULT_COVERS[Math.floor(Math.random() * DEFAULT_COVERS.length)];
                document.getElementById('page-cover').src = page.cover;
                saveState();
            }
        }

        function handleCoverFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const page = state.pages.find(p => p.id === state.activePageId);
                if (page) {
                    page.cover = e.target.result;
                    document.getElementById('page-cover').src = page.cover;
                    saveState();
                }
            };
            reader.readAsDataURL(file);
        }

        // --- Editor Interactions ---

        function focusNewBlockAtBottom() {
            const page = state.pages.find(p => p.id === state.activePageId);
            const lastBlock = page.blocks[page.blocks.length - 1];
            if (lastBlock && lastBlock.type === 'text' && !lastBlock.content) {
                const el = document.querySelector(`[data-id="${lastBlock.id}"] textarea`);
                if (el) el.focus();
            } else {
                addBlockBelow(lastBlock ? lastBlock.id : null);
            }
        }

        // --- Rendering ---

        function renderSidebar() {
            const favList = document.getElementById('favorites-list');
            const pageList = document.getElementById('pages-list');
            const filtered = state.pages.filter(p => p.title.toLowerCase().includes(state.searchQuery.toLowerCase()));
            
            const itemHtml = (p) => `
                <div class="group relative px-2">
                    <button onclick="setActivePage('${p.id}')" class="w-full flex items-center gap-2 px-2 py-1.5 text-sm rounded transition-all ${p.id === state.activePageId ? 'bg-gray-200 text-black font-semibold' : 'text-gray-600 hover:bg-gray-200'}">
                        <span>${p.icon}</span>
                        <span class="truncate flex-1 text-left">${p.title || 'Untitled'}</span>
                        ${p.isFavorite ? '<i data-lucide="star" class="w-3 h-3 text-yellow-500 fill-current"></i>' : ''}
                    </button>
                    <button onclick="event.stopPropagation(); deletePage('${p.id}')" class="absolute right-4 top-2 opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-opacity">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
            `;

            favList.innerHTML = filtered.filter(p => p.isFavorite).map(itemHtml).join('');
            pageList.innerHTML = filtered.filter(p => !p.isFavorite).map(itemHtml).join('');
            lucide.createIcons();
        }

        function deletePage(id) {
            if (state.pages.length <= 1) return;
            state.pages = state.pages.filter(p => p.id !== id);
            if (state.activePageId === id) state.activePageId = state.pages[0].id;
            saveState();
            renderSidebar();
            renderActivePage();
        }

        function renderActivePage() {
            const page = state.pages.find(p => p.id === state.activePageId) || state.pages[0];
            document.getElementById('page-cover').src = page.cover;
            document.getElementById('page-icon').innerText = page.icon;
            document.getElementById('header-icon').innerText = page.icon;
            document.getElementById('main-title-input').value = page.title;
            document.getElementById('header-title').innerText = page.title || 'Untitled';
            
            const favBtn = document.getElementById('favorite-btn');
            favBtn.innerHTML = `<i data-lucide="star" class="w-4 h-4 ${page.isFavorite ? 'fill-yellow-500 text-yellow-500' : ''}"></i>`;

            const container = document.getElementById('editor-blocks');
            container.innerHTML = '';
            page.blocks.forEach((b, i) => container.appendChild(createBlockElement(b, i === 0)));
            lucide.createIcons();
        }

        function createBlockElement(block, isFirst) {
            const div = document.createElement('div');
            div.className = 'group relative w-full px-1 min-h-[24px]';
            div.dataset.id = block.id;

            let html = '';
            switch (block.type) {
                case 'h1': html = `<input class="w-full text-4xl font-bold border-none outline-none bg-transparent placeholder-gray-200 py-2" value="${block.content}" placeholder="Heading 1" />`; break;
                case 'h2': html = `<input class="w-full text-2xl font-semibold border-none outline-none bg-transparent placeholder-gray-200 mt-4 py-1" value="${block.content}" placeholder="Heading 2" />`; break;
                case 'divider': html = `<hr class="my-4 border-gray-200" />`; break;
                case 'todo': html = `<div class="flex items-start gap-2 py-1"><input type="checkbox" ${block.checked ? 'checked' : ''} class="mt-1.5 h-4 w-4 rounded border-gray-300 cursor-pointer" /><input class="flex-1 border-none outline-none bg-transparent ${block.checked ? 'line-through text-gray-400' : ''}" value="${block.content}" placeholder="To-do" /></div>`; break;
                case 'bullet': html = `<div class="flex items-start gap-3 py-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-400 mt-2.5 shrink-0"></div><input class="flex-1 border-none outline-none bg-transparent" value="${block.content}" placeholder="List item" /></div>`; break;
                case 'callout': html = `<div class="flex gap-3 p-4 bg-gray-50 border border-gray-100 rounded-lg my-2"><div class="text-xl">💡</div><textarea rows="1" class="block-textarea w-full resize-none border-none outline-none bg-transparent leading-relaxed">${block.content}</textarea></div>`; break;
                case 'image': html = block.content ? `<div class="relative group/img"><img src="${block.content}" class="w-full rounded-xl shadow-sm my-4 border border-gray-100" /><button onclick="triggerImageUpload('${block.id}')" class="absolute top-6 right-2 opacity-0 group-hover/img:opacity-100 bg-white/90 p-1.5 rounded-lg shadow-sm border border-gray-200 hover:bg-white transition-all"><i data-lucide="edit-3" class="w-4 h-4 text-gray-600"></i></button></div>` : `<div onclick="triggerImageUpload('${block.id}')" class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer text-gray-400 transition-colors my-2"><i data-lucide="image" class="w-8 h-8 mb-2"></i><span class="text-sm">Click to upload image</span></div>`; break;
                case 'whiteboard': html = `<div class="my-4 border border-gray-200 rounded-xl overflow-hidden shadow-sm bg-white"><div class="p-2 bg-gray-50 border-b flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Whiteboard</span><button onclick="clearWhiteboard('${block.id}')" class="text-[10px] px-2 py-1 hover:bg-gray-200 rounded bg-white border font-bold">Clear</button></div><div class="relative w-full h-80"><canvas id="canvas-${block.id}" class="whiteboard-canvas w-full h-full"></canvas></div></div>`; break;
                case 'playground': html = `
                    <div class="my-4 border border-gray-200 rounded-xl overflow-hidden shadow-sm bg-white">
                        <div class="bg-gray-50 px-4 py-2 border-b flex justify-between items-center">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Code Playground</span>
                            <div class="flex gap-2">
                                <button onclick="togglePlaygroundView('${block.id}')" class="text-[10px] font-bold text-blue-600 hover:bg-blue-50 px-2 py-1 rounded">Toggle View</button>
                            </div>
                        </div>
                        <div class="flex flex-col md:flex-row h-96" id="playground-container-${block.id}">
                            <div class="flex-1 flex flex-col border-r border-gray-100">
                                <div class="bg-gray-100/50 px-2 py-0.5 text-[9px] font-bold text-gray-400 uppercase">HTML / Content</div>
                                <textarea class="flex-1 p-3 font-mono text-xs resize-none outline-none" id="pg-html-${block.id}" oninput="updatePlayground('${block.id}')" placeholder="HTML...">${block.content || ''}</textarea>
                                <div class="bg-gray-100/50 px-2 py-0.5 text-[9px] font-bold text-gray-400 uppercase border-t border-gray-100">CSS / Styles</div>
                                <textarea class="flex-1 p-3 font-mono text-xs resize-none outline-none" id="pg-css-${block.id}" oninput="updatePlayground('${block.id}')" placeholder="CSS...">${block.css || ''}</textarea>
                            </div>
                            <div class="flex-1 bg-white p-2">
                                <iframe id="pg-preview-${block.id}" class="w-full h-full playground-preview"></iframe>
                            </div>
                        </div>
                    </div>`; break;
                case 'code': html = `
                    <div class="my-4 rounded-xl overflow-hidden border border-gray-200 shadow-sm bg-white">
                        <div class="bg-gray-50 px-4 py-2 flex justify-between items-center border-b">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Puter Script</span>
                            <button onclick="runCodeBlock('${block.id}')" class="text-xs font-bold text-blue-600 flex items-center gap-1 hover:bg-blue-50 px-2 py-1 rounded transition-colors"><i data-lucide="play" class="w-3 h-3"></i> Run</button>
                        </div>
                        <textarea class="w-full font-mono text-sm bg-white p-4 resize-none min-h-[120px] outline-none" placeholder="// Puter.js code...">${block.content || ''}</textarea>
                        <div id="output-${block.id}" class="hidden p-4 bg-[#1a1a1a] text-green-400 font-mono text-[10px] border-t border-black max-h-32 overflow-y-auto"></div>
                    </div>`; break;
                case 'puter': html = createTerminalHtml(); break;
                default: html = `<textarea rows="1" class="block-textarea w-full resize-none border-none outline-none bg-transparent placeholder-gray-300 py-1.5 leading-relaxed" placeholder="Type '/' for commands...">${block.content || ''}</textarea>`;
            }

            div.innerHTML = `
                <div class="absolute -left-10 top-1 opacity-0 group-hover:opacity-100 transition-all flex items-center gap-0.5 z-10 p-1">
                    <button onclick="deleteBlock('${block.id}')" class="p-1 hover:bg-red-50 rounded text-gray-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    <div class="p-1 drag-handle text-gray-200 hover:text-gray-400 transition-colors"><i data-lucide="grip-vertical" class="w-3.5 h-3.5"></i></div>
                </div>
                ${html}
            `;

            // Setup Events for Inputs
            div.querySelectorAll('input, textarea').forEach(input => {
                if (input.tagName === 'TEXTAREA') {
                    const adjustHeight = () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; };
                    setTimeout(adjustHeight, 0);
                    input.addEventListener('input', adjustHeight);
                }

                input.addEventListener('input', (e) => { 
                    block.content = e.target.value; 
                    if (input.id && input.id.startsWith('pg-css-')) block.css = e.target.value;
                    saveState(); 
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === '/') {
                        if (block.type === 'text' && !block.content) openSlashMenu(div, block.id);
                    }
                    else if (e.key === 'Enter' && block.type !== 'code' && block.type !== 'playground' && !e.shiftKey) { 
                        e.preventDefault(); addBlockBelow(block.id); 
                    }
                    else if (e.key === 'Backspace' && (block.content === '' || !block.content) && !isFirst) { 
                        e.preventDefault(); deleteBlock(block.id); 
                    }
                });

                if (input.type === 'checkbox') {
                    input.addEventListener('change', (e) => {
                        block.checked = e.target.checked;
                        const t = div.querySelector('input[type="text"], textarea');
                        if (t) t.classList.toggle('line-through', block.checked);
                        if (t) t.classList.toggle('text-gray-400', block.checked);
                        saveState();
                    });
                }
            });

            if (block.type === 'whiteboard') setTimeout(() => setupWhiteboard(block), 30);
            if (block.type === 'playground') setTimeout(() => updatePlayground(block.id), 30);
            if (block.type === 'puter') setupTerminalLogic(div);

            return div;
        }

        // --- Block Logic: Playground ---

        function updatePlayground(id) {
            const page = state.pages.find(p => p.id === state.activePageId);
            const block = page.blocks.find(b => b.id === id);
            const htmlInput = document.getElementById(`pg-html-${id}`);
            const cssInput = document.getElementById(`pg-css-${id}`);
            const preview = document.getElementById(`pg-preview-${id}`);
            
            if (!preview || !htmlInput) return;

            const content = htmlInput.value;
            const style = cssInput ? cssInput.value : '';
            
            const doc = `
                <html>
                    <head><style>${style}</style></head>
                    <body>${content}</body>
                </html>
            `;
            preview.srcdoc = doc;

            block.content = content;
            block.css = style;
            saveState();
        }

        function togglePlaygroundView(id) {
            const container = document.getElementById(`playground-container-${id}`);
            container.classList.toggle('flex-col');
            container.classList.toggle('md:flex-row');
        }

        // --- Block Logic: Whiteboard ---

        function setupWhiteboard(block) {
            const canvas = document.getElementById(`canvas-${block.id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            if (block.content) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = block.content;
            }

            let drawing = false;
            let lastX = 0, lastY = 0;

            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cx - r.left, y: cy - r.top };
            };

            const start = (e) => {
                drawing = true;
                const p = getPos(e);
                lastX = p.x; lastY = p.y;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
            };

            const stop = () => {
                if (!drawing) return;
                drawing = false;
                ctx.closePath();
                block.content = canvas.toDataURL();
                saveState();
            };

            const draw = (e) => {
                if (!drawing) return;
                const p = getPos(e);
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#3b82f6';
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                lastX = p.x; lastY = p.y;
            };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', (ev) => { if(ev.touches.length === 1) start(ev); });
            canvas.addEventListener('touchmove', (ev) => { if(ev.touches.length === 1) draw(ev); });
            window.addEventListener('touchend', stop);
        }

        function clearWhiteboard(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const page = state.pages.find(p => p.id === state.activePageId);
            const block = page.blocks.find(b => b.id === id);
            block.content = '';
            saveState();
        }

        // --- Block Logic: Images & Code ---

        function triggerImageUpload(blockId) {
            currentImageBlockId = blockId;
            document.getElementById('block-image-upload-input').click();
        }

        function handleBlockImageFile(input) {
            const file = input.files[0];
            if (!file || !currentImageBlockId) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const page = state.pages.find(p => p.id === state.activePageId);
                const block = page.blocks.find(b => b.id === currentImageBlockId);
                if (block) { block.content = e.target.result; renderActivePage(); saveState(); }
            };
            reader.readAsDataURL(file);
        }

        function runCodeBlock(id) {
            const out = document.getElementById(`output-${id}`);
            out.classList.remove('hidden');
            out.innerHTML = `<span class="text-gray-500 animate-pulse">Running Puter.js Script...</span>`;
            setTimeout(() => {
                out.innerHTML = `
                    <div class="text-blue-400 font-bold mb-1">Execution Log</div>
                    <div class="text-gray-400">[0.0ms] Puter context initialized.</div>
                    <div class="text-green-500">[12.4ms] Puter.fs.write: success.</div>
                    <div class="text-green-500">[21.1ms] Puter.ui.notify: success.</div>
                `;
            }, 500);
        }

        // --- Terminal ---

        function createTerminalHtml() {
            return `
                <div class="bg-[#191919] text-[#e0e0e0] font-mono p-4 rounded-xl h-80 flex flex-col shadow-xl border border-white/10 my-4 overflow-hidden">
                    <div class="flex items-center gap-2 mb-3 border-b border-white/5 pb-2 text-[10px] text-gray-500 uppercase tracking-widest"><i data-lucide="terminal" class="w-3 h-3"></i> Puter Terminal</div>
                    <div class="terminal-history flex-1 overflow-y-auto space-y-1 text-sm scrollbar-hide">
                        ${state.terminalHistory.map(h => `<div class="${h.type === 'input' ? 'flex gap-2 text-blue-400' : 'opacity-80'}">${h.type === 'input' ? '<span>$</span>' : ''}<span class="whitespace-pre-wrap">${h.content}</span></div>`).join('')}
                        <div class="flex gap-2"><span class="text-blue-400">$</span><input class="terminal-input bg-transparent border-none outline-none flex-1 p-0 focus:ring-0" /></div>
                    </div>
                </div>`;
        }

        function setupTerminalLogic(div) {
            const input = div.querySelector('.terminal-input');
            const history = div.querySelector('.terminal-history');
            if (history) history.scrollTop = history.scrollHeight;
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = input.value.trim().toLowerCase();
                    state.terminalHistory.push({ type: 'input', content: input.value });
                    if (val === 'help') state.terminalHistory.push({ type: 'output', content: 'help, clear, date, sysinfo, status, whoami' });
                    else if (val === 'clear') state.terminalHistory = [];
                    else if (val === 'sysinfo') state.terminalHistory.push({ type: 'output', content: 'Node: Puter-Cloud-VNode-9\nUptime: 24d 11h' });
                    else if (val !== '') state.terminalHistory.push({ type: 'output', content: `sh: command not found: ${val}` });
                    input.value = '';
                    renderActivePage(); saveState();
                }
            });
        }

        // --- Editor Core Helpers ---

        function deleteBlock(id) {
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page.blocks.length <= 1) return;
            const index = page.blocks.findIndex(b => b.id === id);
            page.blocks = page.blocks.filter(b => b.id !== id);
            saveState();
            renderActivePage();
            if (index > 0) {
                const prev = page.blocks[index-1];
                setTimeout(() => { const el = document.querySelector(`[data-id="${prev.id}"] textarea, [data-id="${prev.id}"] input`); if(el) el.focus(); }, 10);
            }
        }

        function addBlockBelow(id) {
            const page = state.pages.find(p => p.id === state.activePageId);
            const index = id ? page.blocks.findIndex(b => b.id === id) : -1;
            const newBlock = { id: 'b' + Date.now(), type: 'text', content: '' };
            if (index === -1) page.blocks.push(newBlock);
            else page.blocks.splice(index + 1, 0, newBlock);
            saveState();
            renderActivePage();
            setTimeout(() => { const el = document.querySelector(`[data-id="${newBlock.id}"] textarea`); if(el) el.focus(); }, 10);
        }

        // --- UI Utils ---

        function setupEmojiPicker() {
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = EMOJI_LIST.map(e => `<button onclick="selectEmoji('${e}')" class="p-2 hover:bg-gray-100 rounded-xl text-2xl transition-all hover:scale-110">${e}</button>`).join('');
        }

        function toggleEmojiPicker(e) { e.stopPropagation(); document.getElementById('emoji-picker').classList.toggle('hidden'); }
        function selectEmoji(e) { 
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page) { page.icon = e; renderSidebar(); renderActivePage(); saveState(); }
            document.getElementById('emoji-picker').classList.add('hidden');
        }

        function setupSlashMenu() {
            const items = [
                { type: 'text', icon: 'type', label: 'Text', desc: 'Basic text block' },
                { type: 'h1', icon: 'heading-1', label: 'Heading 1', desc: 'Big title' },
                { type: 'h2', icon: 'heading-2', label: 'Heading 2', desc: 'Section header' },
                { type: 'todo', icon: 'check-square', label: 'To-do List', desc: 'Task with checkbox' },
                { type: 'playground', icon: 'layout', label: 'Code Playground', desc: 'HTML/CSS Preview' },
                { type: 'whiteboard', icon: 'pencil', label: 'Whiteboard', desc: 'Drawing space' },
                { type: 'divider', icon: 'minus', label: 'Divider', desc: 'Separator line' },
                { type: 'callout', icon: 'info', label: 'Callout', desc: 'Important note' },
                { type: 'image', icon: 'image', label: 'Image', desc: 'Upload file' },
                { type: 'code', icon: 'terminal', label: 'Puter Script', desc: 'Cloud script' },
            ];
            document.getElementById('slash-menu-items').innerHTML = items.map(i => `
                <button onclick="selectSlashItem('${i.type}')" class="w-full flex items-center gap-3 p-3 hover:bg-gray-100 text-left transition-colors">
                    <div class="w-8 h-8 flex items-center justify-center bg-gray-50 border border-gray-200 rounded-lg text-gray-500"><i data-lucide="${i.icon}" class="w-4 h-4"></i></div>
                    <div><div class="text-sm font-medium">${i.label}</div><div class="text-[9px] text-gray-400">${i.desc}</div></div>
                </button>
            `).join('');
        }

        function openSlashMenu(el, blockId) {
            state.activeBlockIdForMenu = blockId;
            const menu = document.getElementById('slash-menu');
            const rect = el.getBoundingClientRect();
            menu.classList.remove('hidden');
            let top = rect.bottom + window.scrollY;
            if (top + 350 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 350;
            menu.style.top = top + 'px';
            menu.style.left = rect.left + 'px';
            lucide.createIcons();
            const close = (e) => { if(!menu.contains(e.target)) { menu.classList.add('hidden'); document.removeEventListener('mousedown', close); } };
            document.addEventListener('mousedown', close);
        }

        function selectSlashItem(type) {
            const page = state.pages.find(p => p.id === state.activePageId);
            const block = page.blocks.find(b => b.id === state.activeBlockIdForMenu);
            if (block) {
                block.type = type;
                block.content = (block.content || '').replace('/', '');
                renderActivePage(); saveState();
                setTimeout(() => { 
                    const sel = `[data-id="${block.id}"] textarea, [data-id="${block.id}"] input`;
                    const el = document.querySelector(sel); if(el) el.focus(); 
                }, 20);
            }
            document.getElementById('slash-menu').classList.add('hidden');
        }

        window.onclick = (e) => { if(!e.target.closest('#emoji-picker')) document.getElementById('emoji-picker').classList.add('hidden'); };

        init();
    </script>
</body>
</html>
