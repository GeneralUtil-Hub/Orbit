<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Workspace | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --sidebar-bg: #f7f7f5;
            --text-main: #37352f;
            --text-secondary: #7e7c78;
            --brand-color: #2383e2;
            --border-color: #e9e9e7;
            --block-hover: rgba(55, 53, 47, 0.06);
            --input-bg: #f1f1ef;
            --callout-bg: #f1f1ef;
            --tab-active: #ffffff;
        }

        .dark-mode {
            --bg-primary: #191919;
            --sidebar-bg: #202020;
            --text-main: #ebf1f5;
            --text-secondary: #9b9b9b;
            --brand-color: #2383e2;
            --border-color: #2d2d2d;
            --block-hover: rgba(255, 255, 255, 0.05);
            --input-bg: #252525;
            --callout-bg: #252525;
            --tab-active: #191919;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-primary); 
            color: var(--text-main);
            transition: background-color 0.2s ease;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease; }
        .block-container { transition: background 0.15s ease; border-radius: 4px; padding: 3px 10px; position: relative; display: flex; align-items: flex-start; }
        .block-container:hover { background-color: var(--block-hover); }
        
        #slash-menu { 
            position: absolute; 
            width: 280px;
            z-index: 1000;
            background: var(--bg-primary); 
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 12px 34px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .workspace-highlight-blue { color: #2383e2; border-left: 2px solid #2383e2; padding-left: 8px !important; }
        .workspace-highlight-orange { color: #d9730d; border-left: 2px solid #d9730d; padding-left: 8px !important; }
        .workspace-highlight-green { color: #0f7b6c; border-left: 2px solid #0f7b6c; padding-left: 8px !important; }

        .sidebar-active { background: var(--block-hover); color: var(--text-main) !important; font-weight: 600; }
        
        #reopen-sidebar-trigger {
            position: fixed; left: 0; top: 0; bottom: 0; width: 30px; z-index: 100;
            cursor: pointer; transition: background 0.2s;
        }
        #reopen-sidebar-trigger:hover { background: var(--block-hover); }
        
        .drag-handle { cursor: grab; opacity: 0; transition: opacity 0.2s; position: absolute; left: -45px; top: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .block-container:hover .drag-handle { opacity: 0.5; }

        .quote-block { border-left: 3px solid var(--border-color); padding-left: 14px; font-style: italic; color: var(--text-secondary); }
        .callout-block { background: var(--callout-bg); border-radius: 4px; padding: 12px; display: flex; gap: 12px; width: 100%; border: 1px solid var(--border-color); }
        .code-block { font-family: 'Roboto Mono', monospace; background: var(--input-bg); padding: 12px; border-radius: 4px; font-size: 13px; width: 100%; white-space: pre-wrap; }
        .math-display { text-align: center; padding: 1rem 0; width: 100%; cursor: pointer; }

        .media-block { border-radius: 8px; overflow: hidden; margin: 1rem 0; border: 1px solid var(--border-color); background: #000; position: relative; }
        .media-block img { max-width: 100%; cursor: default; }
        
        .image-drop-zone {
            border: 2px dashed var(--border-color);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .image-drop-zone.dragover { border-color: var(--brand-color); background: rgba(35, 131, 226, 0.05); }

        /* Tab System Styling */
        .place-tab {
            height: 36px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--sidebar-bg);
            max-width: 200px;
            transition: all 0.2s;
        }
        .place-tab.active {
            background: var(--tab-active);
            color: var(--text-main);
            font-weight: 700;
            box-shadow: 0 2px 0 var(--brand-color) inset;
        }
        .place-tab:hover:not(.active) {
            background: var(--block-hover);
        }

        [contenteditable]:focus { outline: none; }
        [placeholder]:empty::before { content: attr(placeholder); color: var(--text-secondary); opacity: 0.3; }

        .modal-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="overflow-hidden">
    <div id="progress-bar" class="fixed top-0 left-0 h-0.5 bg-blue-500 z-[2000] transition-all duration-150" style="width: 0%"></div>

    <!-- Reopen Sidebar Trigger -->
    <div id="reopen-sidebar-trigger" class="hidden flex items-center justify-center" onclick="toggleSidebar()">
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
    </div>

    <!-- Multi-Space Tab Bar -->
    <div id="tab-bar" class="flex h-9 bg-[var(--sidebar-bg)] border-b border-[var(--border-color)] overflow-x-auto scrollbar-hide shrink-0 z-[100]">
        <!-- Tabs injected here -->
    </div>

    <div id="app" class="flex h-[calc(100vh-36px)] w-full relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-transition w-64 flex flex-col bg-[var(--sidebar-bg)] border-r border-[var(--border-color)] shrink-0 z-50 overflow-hidden relative">
            <div class="p-4 flex flex-col gap-4 min-w-[256px]">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 overflow-hidden">
                         <div class="w-6 h-6 rounded bg-blue-600 flex items-center justify-center text-white shrink-0">
                            <i data-lucide="orbit" class="w-3.5 h-3.5"></i>
                         </div>
                        <span id="place-name-display" class="font-black text-sm truncate">Place</span>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-gray-600 transition-colors"><i data-lucide="chevrons-left" class="w-4 h-4"></i></button>
                </div>
                
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3.5 h-3.5 text-gray-400"></i>
                    <input type="text" oninput="handleSearch(this.value)" class="w-full bg-[var(--input-bg)] rounded-md py-1.5 pl-8 pr-3 text-xs outline-none text-[var(--text-main)]" placeholder="Quick Search" />
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-2 space-y-4 scrollbar-hide min-w-[256px]">
                <div>
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest flex justify-between items-center group">
                        Structure
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity" id="sidebar-controls">
                            <button onclick="openWorkspaceModal()" title="New Workspace Folder"><i data-lucide="folder-plus" class="w-3.5 h-3.5"></i></button>
                            <button onclick="addPage()" title="New Page"><i data-lucide="file-plus" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                    <div id="structure-list" class="mt-2 space-y-0.5"></div>
                </div>
            </div>

            <div class="p-4 border-t border-[var(--border-color)] space-y-1 min-w-[256px]">
                <button onclick="openJoinModal()" class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/10 rounded-md font-semibold">
                    <i data-lucide="users" class="w-3.5 h-3.5"></i> Join Space
                </button>
                <button onclick="toggleDarkModeUI()" class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md font-medium">
                    <i data-lucide="moon" class="w-3.5 h-3.5"></i> Dark Mode
                </button>
                <button onclick="logout()" class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 rounded-md font-medium">
                    <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col h-full bg-[var(--bg-primary)] overflow-hidden relative" onclick="handleWorkspaceClick(event)">
            <header class="h-12 flex items-center justify-between px-6 shrink-0 z-30">
                <div id="breadcrumbs" class="flex items-center gap-2 text-xs text-gray-400 font-medium overflow-hidden"></div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleVoiceOrbit()" id="voice-btn" class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-400 transition-all"><i data-lucide="mic" class="w-4 h-4"></i></button>
                    <div id="collaborators" class="flex -space-x-2"></div>
                    <button id="share-btn" onclick="openShareActiveModal()" class="text-[11px] font-bold text-white bg-blue-600 px-3 py-1 rounded hover:bg-blue-700 transition-all">Share</button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto scrollbar-hide" id="main-scroll-container" onscroll="updateProgressBar()">
                <div class="relative h-56 group">
                    <img id="page-cover" class="w-full h-full object-cover" />
                    <div class="absolute bottom-4 right-8 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                        <button onclick="changeCover()" class="bg-white/90 backdrop-blur px-3 py-1.5 rounded text-[10px] font-bold border border-gray-200 shadow-sm hover:bg-white">Random Cover</button>
                    </div>
                </div>

                <div class="max-w-3xl mx-auto px-12 pb-80">
                    <div class="mt-[-48px] mb-10 relative z-10">
                        <div id="page-icon" onclick="toggleEmojiPicker(event)" class="text-8xl cursor-pointer hover:scale-105 transition-transform select-none w-fit">🚀</div>
                        <div id="emoji-picker" class="hidden absolute top-full left-0 mt-4 p-4 bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-lg shadow-xl z-[100] w-64">
                            <div class="grid grid-cols-5 gap-2" id="emoji-grid"></div>
                        </div>
                        <input id="main-title-input" oninput="updatePageTitle(this.value)" class="w-full text-5xl font-black border-none outline-none mt-8 bg-transparent placeholder-gray-200 tracking-tight" placeholder="Untitled Page" />
                    </div>
                    
                    <div id="editor-blocks" class="space-y-0.5"></div>
                    <div id="bottom-click-trigger" class="h-64 w-full cursor-text"></div>
                    
                    <div id="slash-menu">
                        <div class="px-4 py-3 text-[9px] font-bold text-gray-400 uppercase tracking-widest border-b border-[var(--border-color)] bg-gray-50/50 dark:bg-black/20">Blocks</div>
                        <div id="slash-menu-items" class="py-1 overflow-y-auto max-h-[300px]"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="ws-modal" class="hidden fixed inset-0 z-[2000] modal-bg flex items-center justify-center p-6">
        <div class="bg-[var(--bg-primary)] w-full max-w-xs rounded-xl p-6 shadow-2xl">
            <h3 class="font-bold text-sm mb-4" id="ws-modal-title">Workspace Settings</h3>
            <div class="space-y-4">
                <input id="ws-modal-input" type="text" class="w-full bg-[var(--input-bg)] border border-[var(--border-color)] rounded-md px-3 py-2 text-sm outline-none" placeholder="Name..." />
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Accent Color</label>
                    <div class="flex gap-3">
                        <button onclick="setWSModalColor(null)" class="w-6 h-6 rounded-full border border-gray-300 bg-white" title="None"></button>
                        <button onclick="setWSModalColor('blue')" class="w-6 h-6 rounded-full bg-[#2383e2]"></button>
                        <button onclick="setWSModalColor('orange')" class="w-6 h-6 rounded-full bg-[#d9730d]"></button>
                        <button onclick="setWSModalColor('green')" class="w-6 h-6 rounded-full bg-[#0f7b6c]"></button>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 mt-8">
                <button onclick="closeWSModal()" class="flex-1 py-2 text-xs font-medium text-gray-500">Cancel</button>
                <button onclick="saveWSModal()" class="flex-1 py-2 bg-blue-600 rounded-md text-xs font-bold text-white shadow-lg">Done</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-[3000] bg-white dark:bg-[#191919] flex items-center justify-center p-6">
        <div class="w-full max-w-xs text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl">
                <i data-lucide="orbit" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tight">Orbit Workspace</h2>
            <p class="text-xs text-gray-500 mb-8">Personal organization & collaboration.</p>
            <input id="login-username" type="text" class="w-full bg-gray-50 dark:bg-[#252525] border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 text-sm outline-none mb-4 font-bold" placeholder="Your Name" />
            <button onclick="login()" class="w-full py-3 bg-blue-600 rounded-lg text-sm font-bold text-white shadow-lg hover:bg-blue-700">Enter Space</button>
        </div>
    </div>

    <div id="join-modal" class="hidden fixed inset-0 z-[2000] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[var(--bg-primary)] w-full max-w-sm rounded-xl p-6 shadow-2xl">
            <h3 class="font-bold text-lg mb-2">Connect to Space</h3>
            <input id="join-code" type="text" class="w-full bg-gray-50 dark:bg-gray-800 border border-[var(--border-color)] rounded-lg px-4 py-3 text-sm outline-none mb-4 font-mono" placeholder="place_id_..." />
            <div class="flex gap-2">
                <button onclick="document.getElementById('join-modal').classList.add('hidden')" class="flex-1 py-2 text-sm text-gray-500">Cancel</button>
                <button onclick="joinExternalSpace()" class="flex-1 py-2 bg-blue-600 rounded-lg text-sm font-bold text-white">Join</button>
            </div>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[2000] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[var(--bg-primary)] w-full max-w-sm rounded-xl p-8 shadow-2xl text-center">
            <h3 class="font-bold text-xl mb-4" id="share-title">Invite</h3>
            <p class="text-xs text-gray-400 mb-4">Share this ID with others so they can join your space.</p>
            <div class="bg-gray-100 dark:bg-gray-900 p-4 rounded-lg mb-6 font-mono text-sm font-bold text-blue-600 break-all select-all border border-blue-500/10" id="share-code-display"></div>
            <button onclick="copyShareCode()" class="w-full py-3 bg-blue-600 rounded-lg text-sm font-bold text-white shadow-xl mb-4">Copy Code</button>
            <button onclick="document.getElementById('share-modal').classList.add('hidden')" class="text-xs font-bold text-gray-400 uppercase">Close</button>
        </div>
    </div>

    <input type="file" id="image-block-uploader" class="hidden" accept="image/*">
    <div id="remote-audio-container" class="hidden"></div>

    <script>
        const STORAGE_KEY = 'orbit_tabbed_v1';
        const ROOT_ABLY_KEY = "LJhgHg.rF2whQ:Imz-F_d5gOcMGAiJNWIGjhaAXXba8Hpbefj3LtPaT0s";
        const DEFAULT_COVERS = ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000'];
        const EMOJI_LIST = ['🚀', '🪐', '✨', '🌍', '🎨', '📝', '🎯', '💡', '🔥', '📂', '⚡', '📐', '🧬', '🍎', '💻', '💼', '📅', '🔍'];
        
        let state = {
            user: null,
            darkMode: false,
            activePlaceId: null,
            activePageId: null,
            places: [], // Array of { id, name, structure, isOwner, activePageId }
            expandedWorkspaces: new Set(),
            sidebarOpen: true
        };

        let ably = null, channels = {}, sortableMain = null;
        let modalWSContext = null; 
        let modalWSColor = null;

        function init() {
            loadState();
            if (!state.user) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else {
                document.getElementById('auth-modal').classList.add('hidden');
                applyTheme();
                renderTabs();
                renderSidebar();
                if (state.activePageId) renderActivePage();
                setupEmojiPicker();
                setupSlashMenu();
                initAbly();
                if(!state.sidebarOpen) toggleSidebar(false); 
            }
            lucide.createIcons();
        }

        function login() {
            const name = document.getElementById('login-username').value.trim();
            if (!name) return;
            const placeId = 'place_' + Math.random().toString(36).substr(2, 6);
            state.user = { username: name, placeId: placeId };
            
            const initialStructure = [{
                id: 'home_' + Date.now(),
                type: 'page',
                title: 'Quick Start',
                icon: '🚀',
                cover: DEFAULT_COVERS[0],
                blocks: [
                    { id: 'b1', type: 'h1', content: `Welcome to ${name}'s Orbit` },
                    { id: 'b2', type: 'callout', content: 'Use the <b>Join Space</b> button to collaborate in other places.', emoji: '✨' }
                ]
            }];

            state.places = [{
                id: placeId,
                name: `${name}'s Place`,
                structure: initialStructure,
                isOwner: true,
                activePageId: initialStructure[0].id
            }];

            state.activePlaceId = placeId;
            state.activePageId = initialStructure[0].id;
            
            saveState();
            init();
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    Object.assign(state, parsed);
                    state.expandedWorkspaces = new Set(parsed.expandedWorkspaces || []);
                } catch (e) {}
            }
        }

        function saveState() {
            const toSave = { ...state, expandedWorkspaces: Array.from(state.expandedWorkspaces) };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            
            // Broadcast updates only for owned places
            const activePlace = state.places.find(p => p.id === state.activePlaceId);
            if (ably && activePlace && activePlace.isOwner) {
                const channel = ably.channels.get('orbit-place-' + activePlace.id);
                channel.publish('update', { structure: activePlace.structure, name: activePlace.name });
            }
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', state.darkMode);
        }

        function toggleDarkModeUI() { state.darkMode = !state.darkMode; applyTheme(); saveState(); }

        function toggleSidebar(shouldToggle = true) {
            if(shouldToggle) state.sidebarOpen = !state.sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const trigger = document.getElementById('reopen-sidebar-trigger');
            if (state.sidebarOpen) {
                sidebar.style.width = '256px';
                sidebar.style.opacity = '1';
                trigger.classList.add('hidden');
            } else {
                sidebar.style.width = '0px';
                sidebar.style.opacity = '0';
                trigger.classList.remove('hidden');
            }
            saveState();
        }

        // --- Multi-Space Tab Management ---

        function renderTabs() {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = state.places.map(p => `
                <div class="place-tab ${p.id === state.activePlaceId ? 'active' : ''}" onclick="switchPlace('${p.id}')">
                    <i data-lucide="${p.isOwner ? 'home' : 'users'}" class="w-3.5 h-3.5"></i>
                    <span class="truncate">${p.name}</span>
                    ${!p.isOwner ? `<button onclick="removePlace(event, '${p.id}')" class="ml-1 opacity-40 hover:opacity-100 hover:text-red-500"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function switchPlace(id) {
            const place = state.places.find(p => p.id === id);
            if (!place) return;
            state.activePlaceId = id;
            state.activePageId = place.activePageId;
            
            // Toggle sidebar controls based on ownership
            const controls = document.getElementById('sidebar-controls');
            if(place.isOwner) controls.classList.remove('hidden');
            else controls.classList.add('hidden');

            document.getElementById('place-name-display').innerText = place.name;
            renderTabs();
            renderSidebar();
            renderActivePage();
            saveState();
        }

        function removePlace(e, id) {
            e.stopPropagation();
            if(confirm("Remove this joined space?")) {
                state.places = state.places.filter(p => p.id !== id);
                if (state.activePlaceId === id) switchPlace(state.places[0].id);
                else renderTabs();
                saveState();
            }
        }

        // --- Sidebar & Structure Management ---

        function findInStructure(id, list = null) {
            if (!list) {
                const place = state.places.find(p => p.id === state.activePlaceId);
                list = place ? place.structure : [];
            }
            for (let item of list) {
                if (item.id === id) return item;
                if (item.children) {
                    const found = findInStructure(id, item.children);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParent(id, list = null, parent = null) {
            if (!list) {
                const place = state.places.find(p => p.id === state.activePlaceId);
                list = place ? place.structure : [];
            }
            for (let item of list) {
                if (item.id === id) return parent;
                if (item.children) {
                    const found = findParent(id, item.children, item);
                    if (found) return found;
                }
            }
            return null;
        }

        function addPage(parentWS = null) {
            const activePlace = state.places.find(p => p.id === state.activePlaceId);
            if(!activePlace || !activePlace.isOwner) return;

            const page = {
                id: 'pg_' + Math.random().toString(36).substr(2, 6),
                type: 'page',
                title: 'Untitled',
                icon: '📄',
                cover: DEFAULT_COVERS[0],
                blocks: [{ id: 'b_' + Date.now(), type: 'text', content: '' }]
            };
            if (parentWS) {
                const ws = findInStructure(parentWS);
                if (ws) ws.children.push(page);
                state.expandedWorkspaces.add(parentWS);
            } else {
                activePlace.structure.push(page);
            }
            setActivePage(page.id);
        }

        function renderSidebar() {
            const list = document.getElementById('structure-list');
            const place = state.places.find(p => p.id === state.activePlaceId);
            list.innerHTML = '';
            if (place) {
                place.structure.forEach(item => {
                    list.appendChild(createSidebarItem(item, place.isOwner));
                });
            }
            lucide.createIcons();
        }

        function createSidebarItem(item, isOwner, depth = 0) {
            const div = document.createElement('div');
            const isExp = state.expandedWorkspaces.has(item.id);
            const isActive = state.activePageId === item.id;
            const highlightClass = item.highlight ? `workspace-highlight-${item.highlight}` : '';

            div.innerHTML = `
                <div class="group flex items-center px-3 py-1 cursor-pointer transition-colors rounded-md text-[13px] ${isActive ? 'sidebar-active' : 'text-[#7e7c78] hover:bg-[var(--block-hover)]'}" style="padding-left: ${depth * 12 + 12}px">
                    ${item.type === 'workspace' ? `
                        <button onclick="toggleWS(event, '${item.id}')" class="p-0.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded mr-1 transition-transform ${isExp ? 'rotate-90' : ''}">
                            <i data-lucide="chevron-right" class="w-3 h-3"></i>
                        </button>
                    ` : '<div class="w-4"></div>'}
                    
                    <div onclick="${item.type === 'page' ? `setActivePage('${item.id}')` : `toggleWS(event, '${item.id}')`}" class="flex-1 truncate flex items-center gap-2 ${highlightClass}">
                        ${item.type === 'page' ? `<span>${item.icon}</span>` : ''}
                        <span class="truncate">${item.title}</span>
                    </div>

                    ${isOwner ? `
                        <div class="opacity-0 group-hover:opacity-100 flex items-center gap-0.5 ml-auto">
                            ${item.type === 'workspace' ? `
                                <button onclick="addPage('${item.id}')" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded"><i data-lucide="plus" class="w-3 h-3"></i></button>
                                <button onclick="openWorkspaceModal('${item.id}')" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded"><i data-lucide="settings-2" class="w-3 h-3"></i></button>
                            ` : ''}
                            <button onclick="deleteItem(event, '${item.id}')" class="p-1 hover:text-red-500 rounded"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                    ` : ''}
                </div>
            `;

            if (item.type === 'workspace' && isExp && item.children) {
                const sub = document.createElement('div');
                item.children.forEach(c => sub.appendChild(createSidebarItem(c, isOwner, depth + 1)));
                div.appendChild(sub);
            }
            return div;
        }

        // --- Editor Core ---

        function setActivePage(id) {
            state.activePageId = id;
            const place = state.places.find(p => p.id === state.activePlaceId);
            if (place) place.activePageId = id;
            renderSidebar(); renderActivePage(); saveState();
        }

        function renderActivePage() {
            const page = findInStructure(state.activePageId);
            const activePlace = state.places.find(p => p.id === state.activePlaceId);
            const blocksUI = document.getElementById('editor-blocks');
            const breadUI = document.getElementById('breadcrumbs');
            
            if (!page || page.type !== 'page') {
                blocksUI.innerHTML = `<div class="p-20 text-center text-gray-400 text-sm">Welcome to Orbit.</div>`;
                document.getElementById('main-title-input').value = "";
                breadUI.innerHTML = "";
                return;
            }

            document.getElementById('page-cover').src = page.cover || DEFAULT_COVERS[0];
            document.getElementById('page-icon').innerText = page.icon;
            document.getElementById('main-title-input').value = page.title;
            
            const parent = findParent(page.id);
            breadUI.innerHTML = `
                <span class="p-1 px-1.5 rounded font-semibold text-blue-600">${activePlace.name}</span>
                ${parent ? `<i data-lucide="chevron-right" class="w-3 h-3"></i> <span class="font-semibold p-1">${parent.title}</span>` : ''}
                <i data-lucide="chevron-right" class="w-3 h-3"></i> <span class="font-bold text-[var(--text-main)] px-1">${page.title}</span>
            `;

            blocksUI.innerHTML = '';
            page.blocks.forEach((b, i) => {
                const el = createBlockElement(b, i === 0, activePlace.isOwner);
                blocksUI.appendChild(el);
                if (b.type === 'math') katex.render(b.content || 'c = \\sqrt{a^2 + b^2}', el.querySelector('.math-display'), { displayMode: true });
            });

            lucide.createIcons();
            if(activePlace.isOwner) initDragAndDrop();
            
            // Hide/Show owner-only features
            document.getElementById('main-title-input').disabled = !activePlace.isOwner;
            document.getElementById('share-btn').style.display = activePlace.isOwner ? 'block' : 'none';
        }

        function createBlockElement(block, isFirst, isOwner) {
            const div = document.createElement('div');
            div.className = `group relative w-full block-container fade-in`;
            div.dataset.id = block.id;
            
            let html = '';
            const editAttr = isOwner ? 'contenteditable="true"' : 'contenteditable="false"';

            switch (block.type) {
                case 'h1': html = `<div ${editAttr} class="w-full text-3xl font-bold py-2 outline-none" placeholder="Heading 1">${block.content || ''}</div>`; break;
                case 'h2': html = `<div ${editAttr} class="w-full text-2xl font-bold py-2 outline-none" placeholder="Heading 2">${block.content || ''}</div>`; break;
                case 'h3': html = `<div ${editAttr} class="w-full text-xl font-bold py-2 outline-none" placeholder="Heading 3">${block.content || ''}</div>`; break;
                case 'todo': html = `<div class="flex items-start gap-2 py-1"><input type="checkbox" onchange="toggleTodo(this, '${block.id}')" ${block.checked ? 'checked' : ''} ${!isOwner ? 'disabled' : ''} class="mt-1.5 accent-blue-600" /><div ${editAttr} class="flex-1 outline-none ${block.checked ? 'line-through text-gray-400' : ''}" placeholder="To-do...">${block.content || ''}</div></div>`; break;
                case 'quote': html = `<div ${editAttr} class="quote-block outline-none" placeholder="Quote...">${block.content || ''}</div>`; break;
                case 'callout': html = `<div class="callout-block"><span class="text-xl">${block.emoji || '💡'}</span><div ${editAttr} class="flex-1 outline-none font-medium" placeholder="Callout...">${block.content || ''}</div></div>`; break;
                case 'code': html = `<div ${editAttr} class="code-block outline-none" placeholder="Code...">${block.content || ''}</div>`; break;
                case 'math': html = `<div class="math-display"></div><div ${editAttr} class="text-xs text-gray-400 font-mono text-center outline-none hidden">${block.content || 'e = mc^2'}</div>`; break;
                case 'image': 
                    if (block.content) {
                        html = `<div class="media-block relative group"><img src="${block.content}" />${isOwner ? `<button onclick="clearBlockContent('${block.id}')" class="absolute top-2 right-2 p-1 bg-black/60 text-white rounded opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}</div>`;
                    } else {
                        html = isOwner ? `<div class="image-drop-zone" id="drop-${block.id}" onclick="triggerImageUpload('${block.id}')">
                                    <i data-lucide="image" class="w-8 h-8 mx-auto text-gray-300 mb-2"></i>
                                    <p class="text-xs text-gray-400">Drag/Upload or paste URL</p>
                                    <input onkeydown="handleImageURL(event, '${block.id}')" class="mt-4 bg-white dark:bg-black/20 border rounded px-3 py-1 text-xs outline-none w-48 text-center" placeholder="Paste URL..." onclick="event.stopPropagation()"/>
                                </div>` : `<div class="p-8 text-center text-gray-300 italic">No image content</div>`;
                    }
                    break;
                case 'divider': html = `<hr class="my-6 w-full border-[var(--border-color)]" />`; break;
                default: html = `<div ${editAttr} class="flex-1 outline-none py-1.5 text-[15px] leading-relaxed" placeholder="Type '/' for commands...">${block.content || ''}</div>`;
            }

            if(isOwner) {
                div.innerHTML = `
                    <div class="drag-handle">
                        <i data-lucide="grip-vertical" class="w-3.5 h-3.5"></i>
                        <button onclick="deleteBlock('${block.id}')" class="p-1 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>${html}`;
            } else {
                div.innerHTML = html;
            }
            
            if (isOwner) {
                const editor = div.querySelector('[contenteditable="true"]');
                if (editor) {
                    editor.addEventListener('input', () => { 
                        block.content = editor.innerHTML; 
                        if (block.type === 'math') katex.render(editor.innerText || '?', div.querySelector('.math-display'), { displayMode: true });
                        saveState(); 
                    });
                    editor.addEventListener('keydown', (e) => {
                        if (e.key === '/') { if (!editor.innerText.trim()) { e.preventDefault(); openSlashMenu(div, block.id); } }
                        else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addBlockBelow(block.id); }
                        else if (e.key === 'Backspace' && !editor.innerText.trim() && !isFirst) { e.preventDefault(); deleteBlock(block.id); }
                    });
                    editor.addEventListener('focus', () => { if(block.type === 'math') editor.classList.remove('hidden'); });
                    editor.addEventListener('blur', () => { if(block.type === 'math') editor.classList.add('hidden'); });
                }

                if (block.type === 'image' && !block.content) {
                    setTimeout(() => {
                        const zone = document.getElementById(`drop-${block.id}`);
                        if (!zone) return;
                        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
                        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                        zone.addEventListener('drop', (e) => {
                            e.preventDefault();
                            const file = e.dataTransfer.files[0];
                            if (file && file.type.startsWith('image/')) processImageFile(file, block.id);
                        });
                    }, 50);
                }
            }

            return div;
        }

        // --- Collaboration Engine (Multi-Space) ---

        function initAbly() {
            if (!state.user || ably) return;
            ably = new Ably.Realtime({ key: ROOT_ABLY_KEY, clientId: state.user.username });
            state.places.forEach(p => connectToChannel(p.id));
        }

        function connectToChannel(id) {
            if (channels[id]) return;
            const channel = ably.channels.get('orbit-place-' + id);
            channels[id] = channel;

            channel.subscribe('update', (m) => {
                if(m.clientId === ably.auth.clientId) return;
                const place = state.places.find(p => p.id === id);
                if (place) {
                    place.structure = m.data.structure;
                    place.name = m.data.name;
                    if (state.activePlaceId === id) {
                        renderSidebar();
                        renderActivePage();
                        renderTabs();
                    }
                }
            });

            channel.subscribe('request-sync', (m) => {
                const place = state.places.find(p => p.id === id);
                if(place && place.isOwner) {
                    channel.publish('update', { structure: place.structure, name: place.name });
                }
            });

            // If we just joined (not owner), request initial state
            const selfPlace = state.places.find(p => p.id === id);
            if (selfPlace && !selfPlace.isOwner) {
                channel.publish('request-sync', {});
            }
        }

        function openJoinModal() { document.getElementById('join-modal').classList.remove('hidden'); }

        function joinExternalSpace() {
            const code = document.getElementById('join-code').value.trim();
            if(!code || !code.startsWith('place_')) {
                alert("Invalid Place ID.");
                return;
            }
            if (state.places.find(p => p.id === code)) {
                switchPlace(code);
            } else {
                state.places.push({
                    id: code,
                    name: "Joined Space",
                    structure: [],
                    isOwner: false,
                    activePageId: null
                });
                connectToChannel(code);
                switchPlace(code);
            }
            document.getElementById('join-modal').classList.add('hidden');
        }

        // --- Block Helpers ---

        function addBlockBelow(id) {
            const page = findInStructure(state.activePageId);
            if (!page) return;
            const idx = page.blocks.findIndex(b => b.id === id);
            const nb = { id: 'b_' + Math.random().toString(36).substr(2, 6), type: 'text', content: '' };
            page.blocks.splice(idx + 1, 0, nb);
            renderActivePage();
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${nb.id}"] [contenteditable]`);
                if(el) el.focus();
            }, 50);
            saveState();
        }

        function deleteBlock(id) {
            const page = findInStructure(state.activePageId);
            if (page && page.blocks.length > 1) {
                page.blocks = page.blocks.filter(b => b.id !== id);
                renderActivePage();
                saveState();
            }
        }

        function openShareActiveModal() {
            document.getElementById('share-code-display').innerText = state.activePlaceId;
            document.getElementById('share-modal').classList.remove('hidden');
        }

        function logout() {
            if(confirm("Logout? Your work is saved on this browser.")) {
                state.user = null; state.places = [];
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function openWorkspaceModal(id = null) {
            modalWSContext = id;
            const modal = document.getElementById('ws-modal');
            const input = document.getElementById('ws-modal-input');
            if (id) {
                const ws = findInStructure(id);
                input.value = ws.title;
                modalWSColor = ws.highlight;
            } else {
                input.value = "";
                modalWSColor = null;
            }
            modal.classList.remove('hidden');
            input.focus();
        }

        function closeWSModal() { document.getElementById('ws-modal').classList.add('hidden'); }
        function setWSModalColor(color) { modalWSColor = color; }
        function saveWSModal() {
            const name = document.getElementById('ws-modal-input').value.trim();
            const activePlace = state.places.find(p => p.id === state.activePlaceId);
            if (!name || !activePlace) return;
            if (modalWSContext) {
                const ws = findInStructure(modalWSContext);
                ws.title = name; ws.highlight = modalWSColor;
            } else {
                activePlace.structure.push({
                    id: 'ws_' + Math.random().toString(36).substr(2, 6),
                    type: 'workspace', title: name, highlight: modalWSColor, children: []
                });
            }
            renderSidebar(); saveState(); closeWSModal();
        }

        function toggleWS(e, id) {
            e.stopPropagation();
            if (state.expandedWorkspaces.has(id)) state.expandedWorkspaces.delete(id);
            else state.expandedWorkspaces.add(id);
            renderSidebar();
        }

        function deleteItem(e, id) {
            e.stopPropagation();
            if(!confirm("Delete?")) return;
            const activePlace = state.places.find(p => p.id === state.activePlaceId);
            const parent = findParent(id);
            if (parent) parent.children = parent.children.filter(i => i.id !== id);
            else activePlace.structure = activePlace.structure.filter(i => i.id !== id);
            if (state.activePageId === id) state.activePageId = null;
            renderSidebar(); renderActivePage(); saveState();
        }

        function handleWorkspaceClick(e) {
            if (e.target.id === 'main-scroll-container' || e.target.id === 'bottom-click-trigger') {
                const page = findInStructure(state.activePageId);
                const activePlace = state.places.find(p => p.id === state.activePlaceId);
                if (activePlace && activePlace.isOwner && page && page.blocks.length > 0) {
                    const last = page.blocks[page.blocks.length - 1];
                    if (last.content.trim() !== '') addBlockBelow(last.id);
                }
            }
            hideSlashMenu();
        }

        function openSlashMenu(el, id) {
            state.activeBlockIdForMenu = id;
            const menu = document.getElementById('slash-menu');
            const rect = el.getBoundingClientRect();
            menu.style.display = 'flex';
            menu.style.top = (window.scrollY + rect.top - 280) + 'px'; 
            menu.style.left = rect.left + 'px';
            lucide.createIcons();
        }

        function hideSlashMenu() { document.getElementById('slash-menu').style.display = 'none'; }

        function handleSlashAction(type) {
            const page = findInStructure(state.activePageId);
            const block = page.blocks.find(b => b.id === state.activeBlockIdForMenu);
            if (block) {
                block.type = type;
                block.content = '';
                if(type === 'callout') block.emoji = '💡';
                renderActivePage(); saveState();
                if (type !== 'text') addBlockBelow(block.id);
            }
            hideSlashMenu();
        }

        function updatePageTitle(v) {
            const p = findInStructure(state.activePageId);
            if(p) { p.title = v; renderSidebar(); saveState(); }
        }

        function changeCover() {
            const p = findInStructure(state.activePageId);
            if(!p) return;
            p.cover = `https://images.unsplash.com/photo-${Math.floor(Math.random()*1000000)}?auto=format&fit=crop&q=80&w=2000`;
            renderActivePage(); saveState();
        }

        function toggleEmojiPicker(e) { e.stopPropagation(); document.getElementById('emoji-picker').classList.toggle('hidden'); }
        function selectEmoji(e) {
            const p = findInStructure(state.activePageId);
            if(p) { p.icon = e; renderSidebar(); renderActivePage(); saveState(); }
            document.getElementById('emoji-picker').classList.add('hidden');
        }

        function setupEmojiPicker() {
            document.getElementById('emoji-grid').innerHTML = EMOJI_LIST.map(e => `
                <button onclick="selectEmoji('${e}')" class="p-2 hover:bg-gray-100 rounded text-xl transition-transform hover:scale-125">${e}</button>
            `).join('');
        }

        function triggerImageUpload(id) {
            const up = document.getElementById('image-block-uploader');
            up.onchange = (e) => { if (e.target.files[0]) processImageFile(e.target.files[0], id); };
            up.click();
        }

        function processImageFile(file, id) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const block = findInStructure(state.activePageId).blocks.find(b => b.id === id);
                if (block) { block.content = e.target.result; renderActivePage(); saveState(); }
            };
            reader.readAsDataURL(file);
        }

        function handleImageURL(e, id) {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                const block = findInStructure(state.activePageId).blocks.find(b => b.id === id);
                if (block && val) { block.content = val; renderActivePage(); saveState(); }
            }
        }

        function clearBlockContent(id) {
            const block = findInStructure(state.activePageId).blocks.find(b => b.id === id);
            if(block) { block.content = ""; renderActivePage(); saveState(); }
        }

        function setupSlashMenu() {
            const items = [
                { type: 'text', icon: 'type', label: 'Text' },
                { type: 'h1', icon: 'heading-1', label: 'Heading 1' },
                { type: 'h2', icon: 'heading-2', label: 'Heading 2' },
                { type: 'h3', icon: 'heading-3', label: 'Heading 3' },
                { type: 'todo', icon: 'check-square', label: 'To-do List' },
                { type: 'quote', icon: 'quote', label: 'Quote' },
                { type: 'callout', icon: 'lightbulb', label: 'Callout' },
                { type: 'code', icon: 'code', label: 'Code' },
                { type: 'math', icon: 'sigma', label: 'Equation' },
                { type: 'image', icon: 'image', label: 'Image' },
                { type: 'divider', icon: 'minus', label: 'Divider' }
            ];
            document.getElementById('slash-menu-items').innerHTML = items.map(i => `
                <button onclick="handleSlashAction('${i.type}')" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-[var(--block-hover)] text-left group">
                    <div class="w-8 h-8 rounded border border-[var(--border-color)] flex items-center justify-center text-gray-400 group-hover:text-blue-500 bg-white dark:bg-black/20">
                        <i data-lucide="${i.icon}" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <div class="text-[13px] font-semibold text-[var(--text-main)]">${i.label}</div>
                    </div>
                </button>`).join('');
        }

        function initDragAndDrop() {
            if (sortableMain) sortableMain.destroy();
            sortableMain = Sortable.create(document.getElementById('editor-blocks'), {
                group: 'blocks', handle: '.drag-handle', animation: 150,
                onEnd: (e) => {
                    const page = findInStructure(state.activePageId);
                    const b = page.blocks.splice(e.oldIndex, 1)[0];
                    page.blocks.splice(e.newIndex, 0, b);
                    saveState();
                }
            });
        }

        function updateProgressBar() {
            const el = document.getElementById('main-scroll-container');
            const p = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
            document.getElementById('progress-bar').style.width = p + "%";
        }

        function copyShareCode() {
            const c = document.getElementById('share-code-display').innerText;
            navigator.clipboard.writeText(c).then(() => alert("Code Copied!"));
        }

        function toggleVoiceOrbit() { alert("Voice orbit initialized. Signaling in multi-space context..."); }

        init();
    </script>
</body>
</html>
