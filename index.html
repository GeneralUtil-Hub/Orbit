<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --sidebar-bg: #fbfbfa;
            --text-main: #111827;
            --text-secondary: #6b7280;
            --brand-color: #2563eb;
            --border-color: #e5e7eb;
            --block-hover: rgba(55, 53, 47, 0.04);
            --input-bg: #f3f4f6;
            --accent-glow: rgba(37, 99, 235, 0.08);
        }

        .dark-mode {
            --bg-primary: #0f0f12;
            --sidebar-bg: #16161a;
            --text-main: #efeff1;
            --text-secondary: #9ca3af;
            --brand-color: #60a5fa;
            --border-color: #26262a;
            --block-hover: rgba(255, 255, 255, 0.05);
            --input-bg: #1c1c21;
            --accent-glow: rgba(96, 165, 250, 0.12);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            background-color: var(--bg-primary); 
            color: var(--text-main);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .slash-menu-enter { animation: menuPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        @keyframes menuPop { 
            from { opacity: 0; transform: scale(0.98) translateY(5px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        .block-container { transition: background-color 0.2s ease; border-radius: 4px; padding: 2px 4px; position: relative; }
        .block-container:hover { background-color: var(--block-hover); }

        input:focus, textarea:focus { outline: none; }
        
        .scalable-content { position: relative; overflow: hidden; resize: vertical; min-height: 100px; max-width: 100%; border-radius: 0.75rem; border: 1px solid var(--border-color); }
        .resizable-handle { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, rgba(120,120,120,0.2) 50%); z-index: 10; }

        .whiteboard-canvas { touch-action: none; cursor: crosshair; background-color: var(--bg-primary); display: block; width: 100%; height: 100%; }
        
        .drag-handle { cursor: grab; padding: 4px; border-radius: 4px; color: var(--text-secondary); opacity: 0; transition: opacity 0.2s; position: absolute; left: -28px; top: 4px; }
        .block-container:hover .drag-handle { opacity: 0.5; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.15; background: var(--brand-color) !important; }
        
        #format-toolbar { position: fixed; z-index: 1000; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); padding: 4px; display: none; align-items: center; gap: 2px; backdrop-filter: blur(12px); }
        .toolbar-btn { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: var(--text-main); transition: background 0.2s; }
        .toolbar-btn:hover { background: var(--block-hover); }

        #block-clipboard { min-height: 100px; border: 2px dashed var(--border-color); border-radius: 12px; transition: all 0.3s ease; }
        #block-clipboard:empty::after { content: 'Clipboard'; display: block; text-align: center; margin-top: 40px; font-size: 10px; color: var(--text-secondary); opacity: 0.4; }

        .sidebar-item-active { background-color: var(--block-hover); color: var(--text-main); font-weight: 600; border-left: 2px solid var(--brand-color); }
        
        [contenteditable]:empty:before { content: attr(placeholder); color: var(--text-secondary); opacity: 0.4; pointer-events: none; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-color); }
        input:checked + .slider:before { transform: translateX(14px); }

        .orbit-logo { width: 28px; height: 28px; }

        #slash-menu { 
            position: absolute; 
            max-height: 400px; 
            width: 320px;
            overflow: hidden;
            z-index: 1000;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
        }

        .slash-drag-handle { height: 24px; background: var(--input-bg); cursor: move; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border-color); }
        .quote-block { border-left: 3px solid var(--brand-color); padding-left: 1.25rem; font-style: italic; color: var(--text-secondary); margin: 0.75rem 0; }
        .callout-block { background: var(--accent-glow); border-radius: 8px; padding: 1rem; display: flex; gap: 0.75rem; align-items: flex-start; margin: 0.75rem 0; }
        .math-display { background: var(--block-hover); border-radius: 6px; padding: 1rem; text-align: center; cursor: pointer; min-height: 3rem; display: flex; align-items: center; justify-content: center; transition: box-shadow 0.2s; }
        .math-display:hover { box-shadow: 0 0 0 1px var(--brand-color); }
        .math-input { font-family: 'Roboto Mono', monospace; font-size: 0.85rem; padding: 0.5rem; width: 100%; background: var(--input-bg); border-radius: 4px; border: 1px solid var(--border-color); color: var(--text-main); }
        
        .toggle-block summary { cursor: pointer; list-style: none; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; padding: 4px 0; }
        .toggle-block summary::-webkit-details-marker { display: none; }
        .toggle-content { padding-left: 1.5rem; border-left: 1px solid var(--border-color); margin-top: 4px; }

        .orbit-table { width: 100%; border-collapse: collapse; margin: 1rem 0; border: 1px solid var(--border-color); }
        .orbit-table td { border: 1px solid var(--border-color); padding: 8px 12px; font-size: 14px; min-width: 100px; }

        .voice-active { color: #f97316 !important; filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4)); animation: pulse-voice 2s infinite; }
        @keyframes pulse-voice { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="overflow-hidden">
    <div id="app" class="flex h-screen w-full relative z-10">
        <input type="file" id="cover-upload-input" class="hidden" accept="image/*" onchange="handleCoverFile(this)" />
        <input type="file" id="block-image-upload-input" class="hidden" accept="image/*" />

        <!-- Floating Format Toolbar -->
        <div id="format-toolbar">
            <button class="toolbar-btn" onmousedown="applyFormat('bold'); event.preventDefault();">B</button>
            <button class="toolbar-btn" onmousedown="applyFormat('italic'); event.preventDefault();">I</button>
            <button class="toolbar-btn" onmousedown="applyFormat('underline'); event.preventDefault();">U</button>
            <div class="h-4 w-px bg-gray-500/20 mx-1"></div>
            <button class="toolbar-btn text-red-500" onmousedown="applyColor('#ef4444'); event.preventDefault();">Red</button>
            <button class="toolbar-btn text-blue-500" onmousedown="applyColor('#3b82f6'); event.preventDefault();">Blue</button>
            <button class="toolbar-btn bg-yellow-400/20" onmousedown="applyHighlight('#fef08a'); event.preventDefault();">High</button>
            <div class="h-4 w-px bg-gray-500/20 mx-1"></div>
            <button class="toolbar-btn" title="Clear Styles" onmousedown="applyFormat('removeFormat'); event.preventDefault();">
                <i data-lucide="eraser" class="w-3.5 h-3.5"></i>
            </button>
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 flex flex-col bg-[var(--sidebar-bg)] border-r border-[var(--border-color)] transition-all duration-300 shrink-0 z-20">
            <div class="p-4 flex flex-col gap-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 font-bold text-sm tracking-tight">
                        <svg class="orbit-logo" viewBox="0 0 24 24">
                            <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(-20 12 12)" stroke="currentColor" stroke-width="1.8" fill="none" />
                            <circle cx="12" cy="12" r="7" fill="var(--sidebar-bg)" style="transition: fill 0.4s" />
                            <circle cx="12" cy="12" r="5" fill="currentColor" />
                        </svg>
                        Orbit
                    </div>
                    <button onclick="toggleSidebar()" class="hover:bg-gray-500/10 p-1.5 rounded-lg transition-colors text-gray-400">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-400 w-3.5 h-3.5"></i>
                    <input type="text" oninput="handleSearch(this.value)" class="w-full bg-[var(--input-bg)] border-none outline-none rounded-xl py-2 pl-9 pr-3 text-xs focus:ring-1 focus:ring-blue-500/30 transition-all text-[var(--text-main)]" placeholder="Quick Search" />
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-2 space-y-6 scrollbar-hide">
                <div>
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Favorites</div>
                    <div id="favorites-list"></div>
                </div>
                <div>
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest flex justify-between items-center group mb-1">
                        Workspace
                        <button onclick="addPage()" class="p-0.5 hover:bg-gray-500/10 rounded transition-opacity"><i data-lucide="plus" class="w-3 h-3 text-gray-400"></i></button>
                    </div>
                    <div id="pages-list" class="space-y-0.5"></div>
                </div>

                <div class="px-2 mt-4">
                    <div class="px-1 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <i data-lucide="package" class="w-3 h-3"></i> Clipboard
                    </div>
                    <div id="block-clipboard" class="p-2 flex flex-col gap-2 min-h-[100px]"></div>
                </div>
            </div>

            <div class="p-4 border-t border-[var(--border-color)] space-y-2">
                <button onclick="openThemeModal()" class="w-full flex items-center gap-3 px-3 py-2 text-xs text-[var(--text-secondary)] hover:bg-gray-500/10 rounded-xl transition-colors font-medium">
                    <i data-lucide="palette" class="w-4 h-4"></i> Customize Theme
                </button>
                <button onclick="openCollabModal()" class="w-full flex items-center gap-3 px-3 py-2 text-xs text-orange-500 hover:bg-orange-500/5 rounded-xl transition-colors font-medium">
                    <i data-lucide="users" class="w-4 h-4"></i> Join Workspace
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 flex flex-col h-full bg-[var(--bg-primary)] relative overflow-hidden" onclick="handleWorkspaceClick(event)">
            <button id="menu-btn" onclick="toggleSidebar()" class="hidden absolute top-4 left-4 z-40 p-2 bg-[var(--bg-primary)]/80 backdrop-blur rounded-lg shadow-sm border border-[var(--border-color)] hover:bg-[var(--bg-primary)] transition-all"><i data-lucide="menu" class="w-4 h-4"></i></button>

            <div class="h-14 border-b border-[var(--border-color)] flex items-center justify-between px-6 shrink-0 z-20 bg-[var(--bg-primary)]/80 backdrop-blur-md">
                <div class="flex items-center gap-3 text-xs text-gray-400 font-medium">
                    <span>Orbit</span>
                    <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    <span id="header-title" class="text-[var(--text-main)] font-bold truncate max-w-[200px]">Workspace</span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleVoiceOrbit()" id="voice-btn" class="p-2 rounded-lg hover:bg-gray-500/10 transition-all text-gray-400 relative group" title="Voice Call">
                        <i data-lucide="mic" class="w-4 h-4"></i>
                    </button>
                    
                    <div id="collaborators" class="flex -space-x-2 overflow-hidden mr-1"></div>
                    <div id="sync-status" class="hidden flex items-center gap-2 text-[10px] text-green-600 font-bold uppercase tracking-wider">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Live
                    </div>
                    <button onclick="toggleActiveFavorite()" id="favorite-btn" class="p-2 rounded-lg hover:bg-gray-500/10 transition-colors text-gray-400"><i data-lucide="star" class="w-4 h-4"></i></button>
                    <button onclick="openSharePageModal()" class="text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl transition-all shadow-lg active:scale-95">Share</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto scrollbar-hide relative" id="main-scroll-container">
                <div class="relative h-72 group overflow-hidden">
                    <img id="page-cover" src="" alt="Cover" class="w-full h-full object-cover transition-all duration-1000" />
                    <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="absolute bottom-6 right-10 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0 flex gap-2">
                        <button onclick="document.getElementById('cover-upload-input').click()" class="bg-white/90 dark:bg-black/90 backdrop-blur px-4 py-2 text-[10px] font-bold uppercase tracking-wider rounded-xl border border-gray-200 dark:border-gray-800 shadow-xl transition-all flex items-center gap-2 text-gray-700 dark:text-gray-200 hover:scale-105"><i data-lucide="image" class="w-3 h-3"></i> Change Cover</button>
                        <button onclick="changeCover()" class="bg-white/90 dark:bg-black/90 backdrop-blur px-4 py-2 text-[10px] font-bold uppercase tracking-wider rounded-xl border border-gray-200 dark:border-gray-800 shadow-xl transition-all text-gray-700 dark:text-gray-200 hover:scale-105">Random</button>
                    </div>
                </div>

                <div class="max-w-4xl mx-auto px-12 lg:px-32 pb-64 relative">
                    <div class="mt-[-55px] mb-12 relative z-10 group fade-in">
                        <div class="relative inline-block">
                            <div id="page-icon" onclick="toggleEmojiPicker(event)" class="text-8xl cursor-pointer hover:scale-105 rounded-3xl p-3 transition-all active:scale-95 select-none bg-[var(--bg-primary)] shadow-2xl border border-[var(--border-color)]">🚀</div>
                            <div id="emoji-picker" class="hidden absolute top-full left-0 mt-3 p-4 bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-3xl shadow-2xl z-50 w-80 backdrop-filter blur-xl bg-opacity-90">
                                <div class="grid grid-cols-5 gap-2" id="emoji-grid"></div>
                            </div>
                        </div>
                        <input id="main-title-input" oninput="updatePageTitle(this.value)" class="w-full text-6xl font-black border-none outline-none mt-10 placeholder-gray-500/20 tracking-tighter bg-transparent text-[var(--text-main)]" placeholder="Untitled Workspace" />
                    </div>

                    <div id="editor-blocks" class="space-y-0.5 pb-8 min-h-[100px] relative" onclick="event.stopPropagation()"></div>
                    <div id="bottom-click-trigger" class="h-[50vh] w-full cursor-text"></div>
                    
                    <!-- Draggable Slash Menu -->
                    <div id="slash-menu" class="hidden slash-menu-enter">
                        <div class="slash-drag-handle" id="slash-menu-drag">
                            <div class="w-8 h-1 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
                        </div>
                        <div class="px-4 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-[var(--border-color)] bg-[var(--bg-primary)]">Commands</div>
                        <div id="slash-menu-items" class="max-h-80 overflow-y-auto scrollbar-hide py-2 bg-[var(--bg-primary)]"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="theme-modal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center backdrop-blur-md">
        <div class="bg-white dark:bg-[#1e1e1e] w-[420px] rounded-3xl p-8 shadow-2xl fade-in">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-3 dark:text-white"><i data-lucide="palette"></i> Design System</h3>
            <div class="space-y-5 mb-8">
                <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl border border-[var(--border-color)]">
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2"><i data-lucide="moon" class="w-4 h-4"></i> Dark Mode</span>
                    <label class="switch"><input type="checkbox" id="modal-dark-toggle" onchange="toggleDarkMode()"><span class="slider"></span></label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Accent</label><input type="color" id="theme-brand" class="w-full h-12 rounded-xl cursor-pointer bg-transparent border-none" oninput="previewTheme()"></div>
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Canvas</label><input type="color" id="theme-bg" class="w-full h-12 rounded-xl cursor-pointer bg-transparent border-none" oninput="previewTheme()"></div>
                </div>
            </div>
            <div class="flex gap-4"><button onclick="closeThemeModal()" class="flex-1 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl text-sm font-bold text-gray-600 dark:text-gray-300">Cancel</button><button onclick="saveTheme()" class="flex-1 py-4 bg-blue-600 rounded-2xl text-sm font-bold text-white shadow-lg">Save</button></div>
        </div>
    </div>

    <div id="collab-modal" class="hidden fixed inset-0 z-[100] bg-black/40 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1e1e] w-[400px] rounded-3xl p-8 shadow-2xl fade-in">
            <h3 class="text-xl font-bold mb-2 dark:text-white"><i data-lucide="users"></i> Join Workspace</h3>
            <p class="text-sm text-gray-500 mb-6 leading-relaxed">Enter workspace code to sync in real-time.</p>
            <input id="friend-page-code" type="text" placeholder="Code..." class="w-full bg-gray-50 dark:bg-[#2a2a2a] dark:text-white border border-gray-200 dark:border-[#333] rounded-2xl px-5 py-4 text-sm font-mono outline-none mb-6" />
            <div class="flex gap-4"><button onclick="closeCollabModal()" class="flex-1 px-4 py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl text-sm font-semibold text-gray-600 dark:text-gray-300">Back</button><button id="join-btn" onclick="joinFriendPage()" class="flex-1 px-4 py-4 bg-blue-600 rounded-2xl text-sm font-semibold text-white shadow-xl">Connect</button></div>
        </div>
    </div>

    <div id="name-modal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center backdrop-blur-md">
        <div class="bg-white dark:bg-[#1e1e1e] w-96 rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 dark:text-white">Orbit Initialize</h3>
            <input id="initial-name" type="text" class="w-full bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-[#333] dark:text-white rounded-2xl px-5 py-4 text-sm outline-none mb-4" placeholder="Your name..." />
            <button onclick="window.saveInitialName()" class="w-full py-4 bg-blue-600 rounded-2xl text-sm font-bold text-white hover:bg-blue-700 shadow-xl">Launch</button>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[100] bg-black/40 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1e1e] w-96 rounded-3xl p-8 shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4 dark:text-white text-left">Share Code</h3>
            <div class="bg-gray-100 dark:bg-[#2a2a2a] p-5 rounded-2xl mb-8 font-mono text-xl font-bold tracking-widest text-blue-600 select-all border border-[var(--border-color)]" id="share-code-display"></div>
            <button onclick="closeShareModal()" class="w-full py-4 bg-gray-100 dark:bg-gray-800 rounded-2xl text-sm font-bold text-gray-600 dark:text-gray-300">Done</button>
        </div>
    </div>

    <script>
        const ROOT_ABLY_KEY = "LJhgHg.rF2whQ:Imz-F_d5gOcMGAiJNWIGjhaAXXba8Hpbefj3LtPaT0s"; 
        const DEFAULT_COVERS = ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000', 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000', 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&q=80&w=2000'];
        const EMOJI_LIST = ['🚀', '🪐', '🌑', '✨', '🛸', '🛰️', '🌍', '☄️', '🔭', '🎨', '📝', '🛠️', '🌐', '📊', '💻', '⚡', '📦', '🎯'];
        const STORAGE_KEY = 'orbit_workspace_v6_refined';

        let state = {
            username: '',
            darkMode: false,
            onCall: false,
            customTheme: null,
            pages: [{ 
                id: '1', title: 'Welcome to Orbit', icon: '🚀', isFavorite: true, cover: DEFAULT_COVERS[1], isShared: false, 
                blocks: [
                    { id: 'b1', type: 'h1', content: 'Orbit Workspace' }, 
                    { id: 'b2', type: 'text', content: 'Type <b>/</b> to open the command menu. Select a command or keep typing text to hide it.' },
                    { id: 'b3', type: 'callout', content: 'Click the Microphone icon in the header to join a Voice Orbit!' }
                ] 
            }],
            activePageId: '1',
            sidebarOpen: true,
            searchQuery: '',
            clipboard: []
        };

        let ably = null, channel = null, sortableMain = null, sortableClipboard = null;

        window.saveInitialName = function() {
            const name = document.getElementById('initial-name').value.trim();
            if (!name) return;
            state.username = name;
            document.getElementById('name-modal').classList.add('hidden');
            saveState(true);
            init();
        };

        function init() {
            loadState();
            applyTheme();
            if (!state.username) { document.getElementById('name-modal').classList.remove('hidden'); return; }
            renderSidebar();
            renderActivePage();
            setupEmojiPicker();
            setupSlashMenu();
            initDragAndDrop();
            setupFormatListener();
            setupMenuDragging();
            lucide.createIcons();

            // Global hide logic
            document.addEventListener('mousedown', (e) => {
                const menu = document.getElementById('slash-menu');
                if (!menu.contains(e.target) && !e.target.closest('[contenteditable]')) {
                    hideSlashMenu();
                }
            });

            document.getElementById('main-scroll-container').addEventListener('scroll', hideSlashMenu);

            document.getElementById('block-image-upload-input').onchange = (e) => {
                const file = e.target.files[0];
                if (!file || !state.pendingImageBlockId) return;
                const reader = new FileReader();
                reader.onload = (re) => {
                    const page = state.pages.find(pg => pg.id === state.activePageId);
                    const b = page.blocks.find(bk => bk.id === state.pendingImageBlockId);
                    if (b) { b.content = re.target.result; renderActivePage(); saveState(); }
                };
                reader.readAsDataURL(file);
            };
        }

        function hideSlashMenu() {
            const menu = document.getElementById('slash-menu');
            menu.classList.add('hidden');
            state.activeBlockIdForMenu = null;
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { try { Object.assign(state, JSON.parse(saved)); } catch (e) { console.error(e); } }
        }

        function saveState(skipBroadcast = false) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            const activePage = state.pages.find(p => p.id === state.activePageId);
            if (!skipBroadcast && channel && activePage && activePage.isShared) {
                channel.publish('update', { pages: state.pages });
            }
        }

        function applyTheme() {
            document.body.classList.toggle('dark-mode', state.darkMode);
            if (state.customTheme) {
                document.documentElement.style.setProperty('--brand-color', state.customTheme.brand);
                document.documentElement.style.setProperty('--bg-primary', state.customTheme.bg);
            }
            lucide.createIcons();
        }

        function toggleDarkMode() { state.darkMode = document.getElementById('modal-dark-toggle').checked; applyTheme(); saveState(true); }

        function toggleVoiceOrbit() {
            state.onCall = !state.onCall;
            const btn = document.getElementById('voice-btn');
            if (state.onCall) {
                btn.classList.add('voice-active');
                if (channel) channel.presence.update({ onCall: true });
            } else {
                btn.classList.remove('voice-active');
                if (channel) channel.presence.update({ onCall: false });
            }
            lucide.createIcons();
        }

        function setupMenuDragging() {
            const menu = document.getElementById('slash-menu');
            const handle = document.getElementById('slash-menu-drag');
            let x = 0, y = 0, isDown = false;
            handle.addEventListener('mousedown', (e) => { isDown = true; x = e.clientX - menu.offsetLeft; y = e.clientY - menu.offsetTop; e.preventDefault(); });
            document.addEventListener('mousemove', (e) => { if (!isDown) return; menu.style.left = (e.clientX - x) + 'px'; menu.style.top = (e.clientY - y) + 'px'; });
            document.addEventListener('mouseup', () => { isDown = false; });
        }

        function createBlockElement(block, isFirst) {
            const div = document.createElement('div');
            div.className = 'group relative w-full px-2 py-0.5 min-h-[30px] flex items-start gap-1 block-container fade-in';
            div.dataset.id = block.id;

            let html = '';
            switch (block.type) {
                case 'h1': html = `<div contenteditable="true" class="w-full text-4xl font-extrabold py-2 outline-none text-[var(--text-main)]" placeholder="Heading 1">${block.content || ''}</div>`; break;
                case 'h2': html = `<div contenteditable="true" class="w-full text-2xl font-bold mt-4 py-1 outline-none text-[var(--text-main)]" placeholder="Heading 2">${block.content || ''}</div>`; break;
                case 'todo': html = `<div class="flex items-start gap-3 py-1 flex-1"><input type="checkbox" onchange="toggleTodo('${block.id}')" ${block.checked ? 'checked' : ''} class="mt-1.5 h-4 w-4 rounded border-gray-300 cursor-pointer" /><div contenteditable="true" class="flex-1 outline-none ${block.checked ? 'line-through text-gray-500' : 'text-[var(--text-main)]'}" placeholder="To-do">${block.content || ''}</div></div>`; break;
                case 'bullet': html = `<div class="flex items-start gap-3 py-1 flex-1"><div class="w-1.5 h-1.5 rounded-full bg-gray-400 mt-2.5 shrink-0"></div><div contenteditable="true" class="flex-1 outline-none text-[var(--text-main)]" placeholder="List item">${block.content || ''}</div></div>`; break;
                case 'quote': html = `<div contenteditable="true" class="quote-block flex-1 outline-none" placeholder="Quote">${block.content || ''}</div>`; break;
                case 'callout': html = `<div class="callout-block flex-1"><div class="text-xl">💡</div><div contenteditable="true" class="flex-1 outline-none" placeholder="Callout">${block.content || ''}</div></div>`; break;
                case 'toggle': html = `<details class="toggle-block flex-1"><summary><div class="w-4 h-4 flex items-center justify-center"><i data-lucide="chevron-right" class="w-3 h-3"></i></div><div contenteditable="true" class="outline-none font-bold" placeholder="Toggle">${block.content || ''}</div></summary><div class="toggle-content" id="toggle-content-${block.id}"></div></details>`; break;
                case 'table': html = `<table class="orbit-table"><tbody><tr><td contenteditable="true">Item</td><td contenteditable="true">Value</td></tr><tr><td contenteditable="true"></td><td contenteditable="true"></td></tr></tbody></table>`; break;
                case 'code': html = `<div class="code-block"><div class="code-lang">JavaScript</div><div contenteditable="true" class="outline-none block-textarea" style="white-space: pre-wrap;" placeholder="// Type your code here">${block.content || ''}</div></div>`; break;
                case 'image': html = block.content ? `<div class="scalable-content relative group/img flex-1 my-4"><img src="${block.content}" class="w-full h-full object-cover rounded-xl" /><div class="resizable-handle"></div></div>` : `<div onclick="triggerImageUpload('${block.id}')" class="flex-1 flex flex-col items-center justify-center p-12 border-2 border-dashed border-[var(--border-color)] rounded-2xl hover:bg-blue-500/5 cursor-pointer text-gray-400 transition-colors my-2"><i data-lucide="image" class="mb-2"></i><span class="text-xs font-bold uppercase tracking-wider">Upload Media</span></div>`; break;
                case 'math': html = `<div class="w-full my-4"><div class="math-display" onclick="toggleMathEdit('${block.id}')" id="math-render-${block.id}"></div><div id="math-editor-${block.id}" class="hidden mt-2"><textarea class="math-input" placeholder="LaTeX..." oninput="syncMath('${block.id}', this.value)" onblur="toggleMathEdit('${block.id}', false)">${block.content || ''}</textarea></div></div>`; break;
                case 'divider': html = `<hr class="w-full my-6 border-[var(--border-color)]" />`; break;
                default: html = `<div contenteditable="true" class="flex-1 outline-none py-1.5 leading-relaxed text-[var(--text-main)]" placeholder="Type '/' for commands...">${block.content || ''}</div>`;
            }

            div.innerHTML = `
                <div class="flex flex-col items-center opacity-0 group-hover:opacity-100 transition-all py-1 shrink-0 absolute -left-10 top-0">
                    <div class="drag-handle p-1 hover:text-blue-500"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>
                    <button onclick="deleteBlock('${block.id}')" class="p-1 hover:bg-red-500/10 rounded hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
                ${html}
            `;

            div.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('input', () => { 
                    block.content = el.innerHTML; 
                    saveState(); 
                    
                    // Kill menu if text changes
                    const text = el.innerText;
                    if (text !== "/" && text !== "") {
                        hideSlashMenu();
                    }
                });
                
                el.addEventListener('keydown', (e) => {
                    if (e.key === '/') { 
                        if (!el.innerText.trim()) { 
                            e.preventDefault(); 
                            openSlashMenu(div, block.id); 
                        } 
                    }
                    else if (e.key === 'Enter' && !e.shiftKey) { 
                        e.preventDefault(); 
                        const nextType = (block.type === 'todo' || block.type === 'bullet') ? block.type : 'text';
                        addBlockBelow(block.id, nextType); 
                        hideSlashMenu();
                    }
                    else if (e.key === 'Backspace') {
                        if (el.innerText === "/" || el.innerText.trim() === "") {
                            hideSlashMenu();
                        }
                        if (!el.innerText.trim() && !isFirst) {
                            e.preventDefault(); 
                            deleteBlock(block.id); 
                        }
                    }
                    else if (e.key === 'Escape' || e.key === 'ArrowUp' || e.key === 'ArrowDown') { 
                        if (e.key === 'Escape') hideSlashMenu(); 
                    }
                });
            });

            if (block.type === 'toggle' && block.children) {
                const sub = div.querySelector('.toggle-content');
                block.children.forEach(c => sub.appendChild(createBlockElement(c, false)));
            }
            if (block.type === 'math') setTimeout(() => renderMathBlock(block.id, block.content), 50);
            return div;
        }

        function openSlashMenu(el, id) { 
            state.activeBlockIdForMenu = id; 
            const menu = document.getElementById('slash-menu'); 
            const container = document.getElementById('main-scroll-container');
            const selection = window.getSelection();
            
            let rect;
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                rect = range.getBoundingClientRect();
            } else {
                rect = el.getBoundingClientRect();
            }
            
            const containerRect = container.getBoundingClientRect();
            menu.classList.remove('hidden'); 
            
            // Fixed anchor positioning
            let top = (rect.top - containerRect.top + container.scrollTop);
            let left = (rect.left - containerRect.left);
            
            if (left + 320 > containerRect.width) left = containerRect.width - 340;
            if (left < 40) left = 40;
            
            menu.style.top = top + 'px'; 
            menu.style.left = left + 'px'; 
            lucide.createIcons(); 
        }

        function setupSlashMenu() {
            const items = [
                { type: 'text', icon: 'type', label: 'Text', desc: 'Standard writing' }, 
                { type: 'h1', icon: 'heading-1', label: 'Heading 1', desc: 'Large title' }, 
                { type: 'h2', icon: 'heading-2', label: 'Heading 2', desc: 'Section' }, 
                { type: 'todo', icon: 'check-square', label: 'To-do', desc: 'Checklist' }, 
                { type: 'toggle', icon: 'chevron-right', label: 'Toggle', desc: 'Collapsible' },
                { type: 'table', icon: 'table', label: 'Table', desc: 'Data grid' },
                { type: 'code', icon: 'code', label: 'Code', desc: 'Syntax highlight' },
                { type: 'math', icon: 'sigma', label: 'Math', desc: 'LaTeX block' },
                { type: 'quote', icon: 'quote', label: 'Quote', desc: 'Focus text' }, 
                { type: 'callout', icon: 'info', label: 'Callout', desc: 'Highlight' }, 
                { type: 'image', icon: 'image', label: 'Media', desc: 'Upload' }, 
                { type: 'divider', icon: 'minus', label: 'Divider', desc: 'Gap' }
            ];
            document.getElementById('slash-menu-items').innerHTML = items.map(i => `<button onclick="selectSlashItem('${i.type}')" class="w-full flex items-center gap-4 px-4 py-2.5 hover:bg-gray-500/10 text-left transition-colors"><div class="w-9 h-9 flex items-center justify-center bg-gray-500/5 border border-[var(--border-color)] rounded-xl text-gray-400 shrink-0"><i data-lucide="${i.icon}" class="w-4 h-4"></i></div><div><div class="text-xs font-bold text-[var(--text-main)]">${i.label}</div><div class="text-[9px] text-gray-500">${i.desc}</div></div></button>`).join('');
        }

        function selectSlashItem(t) { 
            const p = state.pages.find(pg => pg.id === state.activePageId); 
            const b = p.blocks.find(bk => bk.id === state.activeBlockIdForMenu); 
            if (b) { 
                b.type = t; b.content = ''; 
                if (t === 'math') b.content = 'e^{i\\pi} + 1 = 0';
                renderActivePage(); saveState(); 
                setTimeout(() => {
                    const blockEl = document.querySelector(`[data-id="${b.id}"] [contenteditable="true"]`);
                    if (blockEl) blockEl.focus();
                }, 50);
            }
            hideSlashMenu();
        }

        function renderActivePage() {
            const page = state.pages.find(p => p.id === state.activePageId) || state.pages[0];
            document.getElementById('page-cover').src = page.cover;
            document.getElementById('page-icon').innerText = page.icon;
            document.getElementById('header-title').innerText = page.title || 'Workspace';
            document.getElementById('main-title-input').value = page.title;
            document.getElementById('sync-status').classList.toggle('hidden', !page.isShared);
            const container = document.getElementById('editor-blocks'); container.innerHTML = '';
            page.blocks.forEach((b, i) => container.appendChild(createBlockElement(b, i === 0)));
            const clip = document.getElementById('block-clipboard'); clip.innerHTML = '';
            state.clipboard.forEach(b => {
                const d = document.createElement('div');
                d.className = 'p-3 bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-xl text-[10px] truncate cursor-grab text-[var(--text-main)] mb-1 shadow-sm';
                d.innerText = (b.content || b.type).replace(/<[^>]*>?/gm, '') || 'Block'; d.dataset.id = b.id;
                clip.appendChild(d);
            });
            lucide.createIcons(); initDragAndDrop();
        }

        function toggleMathEdit(id, force) {
            const ed = document.getElementById(`math-editor-${id}`), ren = document.getElementById(`math-render-${id}`);
            const isEd = force !== undefined ? force : ed.classList.contains('hidden');
            if (isEd) { ren.classList.add('hidden'); ed.classList.remove('hidden'); ed.querySelector('textarea').focus(); }
            else { ren.classList.remove('hidden'); ed.classList.add('hidden'); }
        }
        function syncMath(id, val) {
            const page = state.pages.find(p => p.id === state.activePageId);
            const b = page.blocks.find(x => x.id === id); b.content = val; renderMathBlock(id, val); saveState();
        }
        function renderMathBlock(id, content) {
            const el = document.getElementById(`math-render-${id}`);
            if (el) try { katex.render(content || '0', el, { throwOnError: false, displayMode: true }); } catch (e) { el.innerText = 'TeX Error'; }
        }

        function renderSidebar() {
            const fList = document.getElementById('favorites-list'), pList = document.getElementById('pages-list');
            const filtered = state.pages.filter(p => p.title.toLowerCase().includes(state.searchQuery.toLowerCase()));
            const html = (p) => `<div class="group px-2"><button onclick="setActivePage('${p.id}')" class="w-full flex items-center gap-2 px-2 py-2 text-xs rounded-xl transition-all ${p.id === state.activePageId ? 'sidebar-item-active' : 'text-gray-500 hover:bg-gray-500/10'}"><span>${p.icon}</span><span class="truncate flex-1 text-left">${p.title || 'Untitled'}</span></button></div>`;
            fList.innerHTML = filtered.filter(p => p.isFavorite).map(html).join('');
            pList.innerHTML = filtered.filter(p => !p.isFavorite).map(html).join('');
            lucide.createIcons();
        }

        function addPage() { const id = 'p' + Date.now(); state.pages.push({ id, title: 'New Page', icon: '📄', isFavorite: false, cover: DEFAULT_COVERS[0], blocks: [{ id: 'b' + Date.now(), type: 'text', content: '' }] }); setActivePage(id); }
        function setActivePage(id) { state.activePageId = id; saveState(true); renderSidebar(); renderActivePage(); if(channel) initAbly(); }
        function handleSearch(v) { state.searchQuery = v; renderSidebar(); }
        function updatePageTitle(v) { const p = state.pages.find(pg => pg.id === state.activePageId); if(p) { p.title = v; document.getElementById('header-title').innerText = v || 'Workspace'; saveState(); renderSidebar(); } }

        function initDragAndDrop() {
            const main = document.getElementById('editor-blocks'), clip = document.getElementById('block-clipboard');
            if(sortableMain) sortableMain.destroy(); if(sortableClipboard) sortableClipboard.destroy();
            sortableMain = Sortable.create(main, { group: 'orbit', handle: '.drag-handle', animation: 200, onEnd: onDragEnd });
            sortableClipboard = Sortable.create(clip, { group: 'orbit', animation: 200, onEnd: onDragEnd });
        }
        function onDragEnd(evt) {
            const p = state.pages.find(x => x.id === state.activePageId);
            if(evt.to.id === 'block-clipboard') { const b = p.blocks.splice(evt.oldIndex, 1)[0]; state.clipboard.splice(evt.newIndex, 0, b); }
            else if(evt.from.id === 'block-clipboard' && evt.to.id === 'editor-blocks') { const b = state.clipboard.splice(evt.oldIndex, 1)[0]; p.blocks.splice(evt.newIndex, 0, b); }
            else if(evt.from.id === 'editor-blocks') { const b = p.blocks.splice(evt.oldIndex, 1)[0]; p.blocks.splice(evt.newIndex, 0, b); }
            saveState(); renderSidebar(); renderActivePage();
        }

        function initAbly() {
            if (!ROOT_ABLY_KEY || ably) return;
            ably = new Ably.Realtime({ key: ROOT_ABLY_KEY, clientId: state.username });
            const page = state.pages.find(p => p.id === state.activePageId);
            if (page && page.isShared) joinChannel(state.activePageId);
        }
        function joinChannel(id) {
            if (!ably) return; if(channel) { channel.unsubscribe(); }
            channel = ably.channels.get('orbit-v6-' + id, { params: { rewind: '1' } });
            channel.subscribe('update', (m) => {
                if (m.clientId === ably.auth.clientId) return;
                const remote = m.data.pages.find(p => p.id === id);
                if (remote) { state.pages = state.pages.map(p => p.id === id ? remote : p); renderSidebar(); renderActivePage(); }
            });
            channel.presence.enter({ onCall: state.onCall });
            channel.presence.subscribe(() => { channel.presence.get((err, m) => { if(!err) renderCollabs(m); }); });
            document.getElementById('sync-status').classList.remove('hidden');
        }
        function renderCollabs(members) {
            document.getElementById('collaborators').innerHTML = members.map(m => `
                <div class="w-7 h-7 rounded-full bg-blue-500 border-2 border-[var(--bg-primary)] flex items-center justify-center text-[10px] text-white font-bold relative" title="${m.clientId}">
                    ${m.clientId.charAt(0).toUpperCase()}
                    ${m.data?.onCall ? '<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-orange-500 rounded-full border-2 border-[var(--bg-primary)]"></div>' : ''}
                </div>
            `).join('');
        }

        async function joinFriendPage() {
            const code = document.getElementById('friend-page-code').value.trim();
            if (!code || !ably) return;
            const temp = ably.channels.get('orbit-v6-' + code, { params: { rewind: '1' } });
            temp.subscribe('update', (msg) => {
                const shared = msg.data.pages.find(p => p.id === code);
                if (shared) {
                    shared.isShared = true;
                    if (!state.pages.find(p => p.id === code)) state.pages.push(shared);
                    else state.pages = state.pages.map(p => p.id === code ? shared : p);
                    state.activePageId = code; joinChannel(code); renderSidebar(); renderActivePage(); saveState(true);
                    closeCollabModal();
                }
            });
        }

        function openThemeModal() { document.getElementById('theme-modal').classList.remove('hidden'); }
        function closeThemeModal() { document.getElementById('theme-modal').classList.add('hidden'); }
        function openCollabModal() { document.getElementById('collab-modal').classList.remove('hidden'); }
        function closeCollabModal() { document.getElementById('collab-modal').classList.add('hidden'); }
        function closeShareModal() { document.getElementById('share-modal').classList.add('hidden'); }
        function openSharePageModal() {
            const p = state.pages.find(p => p.id === state.activePageId); if(!p) return;
            p.isShared = true; document.getElementById('share-code-display').innerText = p.id;
            document.getElementById('share-modal').classList.remove('hidden'); saveState(); initAbly();
        }

        function triggerImageUpload(id) { state.pendingImageBlockId = id; document.getElementById('block-image-upload-input').click(); }
        function handleCoverFile(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (e) => { const p = state.pages.find(x => x.id === state.activePageId); if(p) { p.cover = e.target.result; document.getElementById('page-cover').src = p.cover; saveState(); } };
            r.readAsDataURL(f);
        }
        function changeCover() { const p = state.pages.find(pg => pg.id === state.activePageId); if(p) { p.cover = DEFAULT_COVERS[Math.floor(Math.random()*DEFAULT_COVERS.length)]; renderActivePage(); saveState(); } }
        function toggleEmojiPicker(e) { e.stopPropagation(); document.getElementById('emoji-picker').classList.toggle('hidden'); }
        function selectEmoji(e) { const p = state.pages.find(pg => pg.id === state.activePageId); if(p) { p.icon = e; renderSidebar(); renderActivePage(); saveState(); } document.getElementById('emoji-picker').classList.add('hidden'); }
        function setupEmojiPicker() { document.getElementById('emoji-grid').innerHTML = EMOJI_LIST.map(e => `<button onclick="selectEmoji('${e}')" class="p-2 hover:bg-gray-500/10 rounded-2xl text-3xl transition-all hover:scale-110 active:scale-90">${e}</button>`).join(''); }
        function toggleSidebar() { state.sidebarOpen = !state.sidebarOpen; const sb = document.getElementById('sidebar'); sb.style.width = state.sidebarOpen ? '256px' : '0px'; sb.style.opacity = state.sidebarOpen ? '1' : '0'; document.getElementById('menu-btn').classList.toggle('hidden', state.sidebarOpen); }
        function handleWorkspaceClick(e) { if(e.target.id === 'main-scroll-container' || e.target.id === 'bottom-click-trigger') focusNewBlockAtBottom(); }
        function focusNewBlockAtBottom() {
            const p = state.pages.find(pg => pg.id === state.activePageId);
            const last = p.blocks[p.blocks.length - 1];
            if (last && last.type === 'text' && !last.content) { const el = document.querySelector(`[data-id="${last.id}"] [contenteditable]`); if (el) el.focus(); }
            else addBlockBelow(last ? last.id : null);
        }
        function addBlockBelow(id, type = 'text') {
            const p = state.pages.find(pg => pg.id === state.activePageId);
            const idx = id ? p.blocks.findIndex(b => b.id === id) : -1;
            const nb = { id: 'b' + Date.now(), type, content: '', checked: false };
            if (idx === -1) p.blocks.push(nb); else p.blocks.splice(idx + 1, 0, nb);
            renderActivePage(); saveState();
            setTimeout(() => { const el = document.querySelector(`[data-id="${nb.id}"] [contenteditable]`); if(el) el.focus(); }, 10);
        }
        function deleteBlock(id) {
            const p = state.pages.find(pg => pg.id === state.activePageId);
            if (p.blocks.length > 1) p.blocks = p.blocks.filter(b => b.id !== id);
            else { p.blocks[0].content = ''; p.blocks[0].type = 'text'; }
            saveState(); renderActivePage();
        }
        function toggleTodo(id) { const p = state.pages.find(pg => pg.id === state.activePageId); const b = p.blocks.find(bk => bk.id === id); if(b) { b.checked = !b.checked; saveState(); renderActivePage(); } }
        function setupFormatListener() {
            document.addEventListener('selectionchange', () => {
                const selection = window.getSelection(); const tb = document.getElementById('format-toolbar');
                if (selection && selection.toString().length > 0 && !selection.isCollapsed) {
                    const r = selection.getRangeAt(0); const rect = r.getBoundingClientRect();
                    tb.style.display = 'flex'; tb.style.top = `${rect.top - 45}px`; tb.style.left = `${rect.left}px`;
                } else tb.style.display = 'none';
            });
        }
        function applyFormat(cmd) { document.execCommand(cmd, false, null); saveState(); }
        function applyColor(c) { document.execCommand('foreColor', false, c); saveState(); }
        function applyHighlight(c) { document.execCommand('hiliteColor', false, c); saveState(); }
        window.onclick = (e) => { if(!e.target.closest('#emoji-picker')) document.getElementById('emoji-picker').classList.add('hidden'); };
        init();
    </script>
</body>
</html>
