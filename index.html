<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono&display=swap');
        
        :root {
            --bg-primary: #ffffff;
            --sidebar-bg: #fbfbfa;
            --text-main: #111827;
            --text-secondary: #6b7280;
            --brand-color: #2563eb;
            --border-color: #e5e7eb;
            --block-hover: rgba(55, 53, 47, 0.04);
            --input-bg: #f3f4f6;
            --accent-glow: rgba(37, 99, 235, 0.08);
        }

        .dark-mode {
            --bg-primary: #0f0f12;
            --sidebar-bg: #16161a;
            --text-main: #efeff1;
            --text-secondary: #9ca3af;
            --brand-color: #60a5fa;
            --border-color: #26262a;
            --block-hover: rgba(255, 255, 255, 0.05);
            --input-bg: #1c1c21;
            --accent-glow: rgba(96, 165, 250, 0.12);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            background-color: var(--bg-primary); 
            color: var(--text-main);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .block-container { transition: background-color 0.2s ease; border-radius: 4px; padding: 2px 4px; position: relative; }
        .block-container:hover { background-color: var(--block-hover); }
        input:focus, textarea:focus { outline: none; }
        
        .drag-handle { cursor: grab; padding: 4px; border-radius: 4px; color: var(--text-secondary); opacity: 0; transition: opacity 0.2s; position: absolute; left: -28px; top: 4px; }
        .block-container:hover .drag-handle { opacity: 0.5; }
        
        .sidebar-item-active { background-color: var(--block-hover); color: var(--text-main); font-weight: 600; border-left: 2px solid var(--brand-color); }
        [contenteditable]:empty:before { content: attr(placeholder); color: var(--text-secondary); opacity: 0.4; pointer-events: none; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-color); }
        input:checked + .slider:before { transform: translateX(14px); }

        #slash-menu { 
            position: absolute; 
            max-height: 400px; 
            width: 260px;
            overflow: hidden;
            z-index: 1000;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
        }

        .slash-drag-handle { height: 12px; background: var(--input-bg); cursor: move; border-bottom: 1px solid var(--border-color); }
        .quote-block { border-left: 3px solid var(--brand-color); padding-left: 1.25rem; font-style: italic; color: var(--text-secondary); margin: 0.5rem 0; }
        .callout-block { background: var(--accent-glow); border-radius: 8px; padding: 1rem; display: flex; gap: 0.75rem; align-items: flex-start; margin: 0.5rem 0; }
        .orbit-table { width: 100%; border-collapse: collapse; margin: 1rem 0; border: 1px solid var(--border-color); }
        .orbit-table td { border: 1px solid var(--border-color); padding: 8px 12px; font-size: 14px; }
        .voice-active { color: #f97316 !important; filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4)); animation: pulse-voice 2s infinite; }
        @keyframes pulse-voice { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        #voice-overlay { position: fixed; bottom: 24px; right: 24px; z-index: 50; display: none; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="app" class="flex h-screen w-full relative z-10">
        <input type="file" id="cover-upload-input" class="hidden" accept="image/*" onchange="handleCoverFile(this)" />
        <div id="format-toolbar" class="bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-lg shadow-xl p-1 flex items-center gap-1">
            <button class="toolbar-btn p-1 px-2 hover:bg-gray-100 rounded text-xs font-bold" onmousedown="applyFormat('bold'); event.preventDefault();">B</button>
            <button class="toolbar-btn p-1 px-2 hover:bg-gray-100 rounded text-xs italic" onmousedown="applyFormat('italic'); event.preventDefault();">I</button>
            <div class="h-4 w-px bg-gray-200 mx-1"></div>
            <button class="toolbar-btn p-1 px-2 text-red-500 hover:bg-red-50 rounded text-[10px] font-bold" onmousedown="applyColor('#ef4444'); event.preventDefault();">Red</button>
            <button class="toolbar-btn p-1 px-2 text-blue-500 hover:bg-blue-50 rounded text-[10px] font-bold" onmousedown="applyColor('#3b82f6'); event.preventDefault();">Blue</button>
        </div>

        <aside id="sidebar" class="w-64 flex flex-col bg-[var(--sidebar-bg)] border-r border-[var(--border-color)] transition-all duration-300 shrink-0 z-20">
            <div class="p-4 flex flex-col gap-5">
                <div class="flex items-center justify-between font-bold text-sm">
                    <div class="flex items-center gap-2">Orbit</div>
                    <button onclick="toggleSidebar()" class="text-gray-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                </div>
                <input type="text" oninput="handleSearch(this.value)" class="w-full bg-[var(--input-bg)] rounded-xl py-2 px-3 text-xs outline-none" placeholder="Search" />
            </div>
            <div class="flex-1 overflow-y-auto px-2 space-y-4 scrollbar-hide">
                <div>
                    <div class="px-3 py-1 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Workspace</div>
                    <div id="pages-list" class="space-y-0.5 mt-2"></div>
                </div>
            </div>
            <div class="p-4 border-t border-[var(--border-color)] space-y-2">
                <button onclick="openCollabModal()" class="w-full flex items-center gap-3 px-3 py-2 text-xs text-orange-500 hover:bg-orange-50 rounded-xl transition-colors font-medium">
                    <i data-lucide="users" class="w-4 h-4"></i> Join Workspace
                </button>
                <button onclick="addPage()" class="w-full flex items-center gap-3 px-3 py-2 text-xs text-gray-500 hover:bg-gray-100 rounded-xl transition-colors font-medium">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Page
                </button>
            </div>
        </aside>

        <main id="main-content" class="flex-1 flex flex-col h-full bg-[var(--bg-primary)] relative overflow-hidden" onclick="handleWorkspaceClick(event)">
            <div class="h-14 border-b border-[var(--border-color)] flex items-center justify-between px-6 shrink-0 z-20 bg-[var(--bg-primary)]/80 backdrop-blur-md">
                <div id="header-title" class="text-xs font-bold text-[var(--text-main)]">Workspace</div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleVoiceOrbit()" id="voice-btn" class="p-2 rounded-lg hover:bg-gray-100 text-gray-400"><i data-lucide="mic" class="w-4 h-4"></i></button>
                    <div id="collaborators" class="flex -space-x-2"></div>
                    <div id="sync-status" class="hidden flex items-center gap-2 text-[10px] text-green-600 font-bold uppercase"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Live</div>
                    <button onclick="openSharePageModal()" class="text-[10px] font-bold text-white bg-blue-600 px-3 py-1.5 rounded-lg">Share</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto scrollbar-hide relative" id="main-scroll-container">
                <div class="relative h-64 group overflow-hidden">
                    <img id="page-cover" src="" alt="Cover" class="w-full h-full object-cover" />
                    <button onclick="document.getElementById('cover-upload-input').click()" class="absolute bottom-4 right-4 bg-white/90 px-3 py-1.5 text-[10px] font-bold rounded-lg border shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">Change Cover</button>
                </div>
                <div class="max-w-3xl mx-auto px-8 lg:px-20 pb-64 relative">
                    <div class="mt-[-40px] mb-8 relative z-10">
                        <div id="page-icon" onclick="toggleEmojiPicker(event)" class="text-7xl cursor-pointer hover:scale-105 transition-transform select-none">🚀</div>
                        <div id="emoji-picker" class="hidden absolute top-full left-0 mt-2 p-4 bg-white border rounded-2xl shadow-2xl z-50 w-64"><div class="grid grid-cols-5 gap-2" id="emoji-grid"></div></div>
                        <input id="main-title-input" oninput="updatePageTitle(this.value)" class="w-full text-5xl font-black border-none outline-none mt-8 bg-transparent text-[var(--text-main)]" placeholder="Untitled" />
                    </div>
                    <div id="editor-blocks" class="space-y-0.5 min-h-[100px]"></div>
                    <div id="bottom-click-trigger" class="h-64 w-full cursor-text"></div>
                    <div id="slash-menu" class="slash-menu-enter">
                        <div class="slash-drag-handle" id="slash-menu-drag"></div>
                        <div id="slash-menu-items" class="py-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="voice-overlay" class="bg-white dark:bg-[#1e1e1e] border border-[var(--border-color)] rounded-2xl p-4 shadow-2xl w-56 fade-in">
        <div class="text-[10px] font-bold text-gray-400 uppercase mb-3">In Voice Room</div>
        <div id="voice-participants" class="space-y-2"></div>
        <button onclick="toggleVoiceOrbit()" class="w-full mt-4 py-2 bg-red-500/10 text-red-500 text-[10px] font-bold uppercase rounded-lg">Leave</button>
    </div>

    <div id="collab-modal" class="hidden fixed inset-0 z-[100] bg-black/40 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1e1e] w-80 rounded-2xl p-6 shadow-2xl text-center">
            <h3 class="font-bold mb-4">Join Workspace</h3>
            <input id="friend-page-code" type="text" placeholder="Workspace Code" class="w-full bg-gray-50 border rounded-xl px-4 py-3 text-sm outline-none mb-4" />
            <button onclick="joinFriendPage()" class="w-full py-3 bg-blue-600 rounded-xl text-sm font-bold text-white">Connect</button>
        </div>
    </div>

    <div id="name-modal" class="hidden fixed inset-0 z-[200] bg-black/60 flex items-center justify-center backdrop-blur-md">
        <div class="bg-white w-72 rounded-2xl p-6 shadow-2xl">
            <h3 class="font-bold mb-4">Orbit Identity</h3>
            <input id="initial-name" type="text" class="w-full bg-gray-50 border rounded-xl px-4 py-3 text-sm outline-none mb-4" placeholder="Your name" />
            <button onclick="window.saveInitialName()" class="w-full py-3 bg-blue-600 rounded-xl text-sm font-bold text-white">Enter</button>
        </div>
    </div>

    <div id="share-modal" class="hidden fixed inset-0 z-[100] bg-black/40 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-72 rounded-2xl p-6 shadow-2xl text-center">
            <h3 class="font-bold mb-4">Share Code</h3>
            <div class="bg-gray-100 p-4 rounded-xl mb-4 font-mono text-xs font-bold text-blue-600" id="share-code-display"></div>
            <button onclick="closeShareModal()" class="w-full py-2 text-xs font-bold text-gray-500">Close</button>
        </div>
    </div>

    <div id="remote-audio-container" class="hidden"></div>

    <script>
        const ROOT_ABLY_KEY = "LJhgHg.rF2whQ:Imz-F_d5gOcMGAiJNWIGjhaAXXba8Hpbefj3LtPaT0s"; 
        const DEFAULT_COVERS = ['https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000', 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000'];
        const EMOJI_LIST = ['🚀', '🪐', '🌑', '✨', '🛸', '🛰️', '🌍', '☄️', '🔭', '🎨', '📝', '🛠️', '🎯'];
        const STORAGE_KEY = 'orbit_workspace_v10_sync';

        let state = {
            username: '', darkMode: false, onCall: false, activePageId: '1',
            pages: [{ 
                id: '1', title: 'Home', icon: '🚀', cover: DEFAULT_COVERS[1], isShared: false, 
                blocks: [{ id: 'b1', type: 'h1', content: 'Welcome' }, { id: 'b2', type: 'text', content: 'Start typing...' }] 
            }],
        };

        let ably = null, channel = null, sortableMain = null;
        let localStream = null, peerConnections = {};

        window.saveInitialName = function() {
            const name = document.getElementById('initial-name').value.trim();
            if (!name) return;
            state.username = name;
            document.getElementById('name-modal').classList.add('hidden');
            saveState(true);
            init();
        };

        function init() {
            loadState();
            if (!state.username) { document.getElementById('name-modal').classList.remove('hidden'); return; }
            renderSidebar(); renderActivePage(); setupEmojiPicker(); setupSlashMenu();
            initDragAndDrop(); setupFormatListener(); setupMenuDragging();
            document.addEventListener('mousedown', (e) => {
                const menu = document.getElementById('slash-menu');
                if (menu && menu.style.display === 'flex' && !menu.contains(e.target)) hideSlashMenu();
            });
            initAbly();
            lucide.createIcons();
        }

        function hideSlashMenu() {
            const menu = document.getElementById('slash-menu');
            if (menu) { menu.style.display = 'none'; state.activeBlockIdForMenu = null; }
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { try { Object.assign(state, JSON.parse(saved)); } catch (e) {} }
        }

        function saveState(skipBroadcast = false) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            const activePage = state.pages.find(p => p.id === state.activePageId);
            if (!skipBroadcast && channel && activePage?.isShared) {
                channel.publish('update', { pages: state.pages });
            }
        }

        async function toggleVoiceOrbit() {
            state.onCall = !state.onCall;
            const btn = document.getElementById('voice-btn');
            const overlay = document.getElementById('voice-overlay');
            if (state.onCall) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.classList.add('voice-active');
                    overlay.style.display = 'block';
                } catch (e) { state.onCall = false; return; }
            } else {
                btn.classList.remove('voice-active');
                overlay.style.display = 'none';
                if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
                Object.values(peerConnections).forEach(pc => pc.close());
                peerConnections = {};
                document.getElementById('remote-audio-container').innerHTML = '';
            }
            if (channel) {
                channel.presence.update({ onCall: state.onCall });
                channel.publish('signal', { type: 'hello' }); // Inform others to start calling
            }
        }

        function createPeerConnection(remoteId) {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = (e) => { if (e.candidate) channel.publish('signal', { to: remoteId, type: 'ice', data: e.candidate }); };
            pc.ontrack = (e) => {
                let audio = document.getElementById(`audio-${remoteId}`);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = `audio-${remoteId}`;
                    audio.autoplay = true;
                    document.getElementById('remote-audio-container').appendChild(audio);
                }
                audio.srcObject = e.streams[0];
            };
            peerConnections[remoteId] = pc;
            return pc;
        }

        async function handleSignal(m) {
            const { from, to, type, data } = m.data;
            if (m.clientId === ably.auth.clientId || (to && to !== ably.auth.clientId)) return;
            let pc = peerConnections[from] || createPeerConnection(from);
            if (type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                channel.publish('signal', { to: from, type: 'answer', data: ans });
            } else if (type === 'answer') await pc.setRemoteDescription(new RTCSessionDescription(data));
            else if (type === 'ice') await pc.addIceCandidate(new RTCIceCandidate(data));
        }

        function createBlockElement(block, isFirst) {
            const div = document.createElement('div');
            div.className = 'group relative w-full px-2 py-0.5 flex items-start gap-1 block-container fade-in';
            div.dataset.id = block.id;
            let html = '';
            switch (block.type) {
                case 'h1': html = `<div contenteditable="true" class="w-full text-4xl font-extrabold py-2 outline-none" placeholder="Heading 1">${block.content || ''}</div>`; break;
                case 'quote': html = `<div contenteditable="true" class="quote-block flex-1 outline-none" placeholder="Quote">${block.content || ''}</div>`; break;
                case 'callout': html = `<div class="callout-block flex-1"><div class="text-xl">💡</div><div contenteditable="true" class="flex-1 outline-none" placeholder="Callout">${block.content || ''}</div></div>`; break;
                case 'table': html = `<table class="orbit-table"><tbody><tr><td contenteditable="true">Item</td><td contenteditable="true">Value</td></tr></tbody></table>`; break;
                case 'divider': html = `<hr class="w-full my-6 border-gray-200" />`; break;
                default: html = `<div contenteditable="true" class="flex-1 outline-none py-1.5 leading-relaxed" placeholder="Type '/' for commands...">${block.content || ''}</div>`;
            }
            div.innerHTML = `<div class="drag-handle opacity-0 group-hover:opacity-100 transition-opacity absolute -left-8 top-1"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>${html}`;
            const edit = div.querySelector('[contenteditable="true"]');
            if (edit) {
                edit.addEventListener('input', () => { block.content = edit.innerHTML; saveState(); if (edit.innerText.length > 5 && !edit.innerText.startsWith('/')) hideSlashMenu(); });
                edit.addEventListener('keydown', (e) => {
                    if (e.key === '/') { if (!edit.innerText.trim()) { e.preventDefault(); openSlashMenu(div, block.id); } }
                    else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addBlockBelow(block.id); hideSlashMenu(); }
                    else if (e.key === 'Backspace' && !edit.innerText.trim() && !isFirst) { e.preventDefault(); deleteBlock(block.id); }
                    else if (e.key === 'Escape') hideSlashMenu();
                });
            }
            return div;
        }

        function openSlashMenu(el, id) { 
            state.activeBlockIdForMenu = id; 
            const menu = document.getElementById('slash-menu'), container = document.getElementById('main-scroll-container');
            const sel = window.getSelection();
            let rect = sel.rangeCount > 0 ? sel.getRangeAt(0).getBoundingClientRect() : el.getBoundingClientRect();
            const cRect = container.getBoundingClientRect();
            menu.style.display = 'flex'; 
            menu.style.top = (rect.top - cRect.top + container.scrollTop - 4) + 'px'; 
            menu.style.left = (rect.left - cRect.left) + 'px'; 
            lucide.createIcons(); 
        }

        function setupSlashMenu() {
            const items = [
                { type: 'text', icon: 'type', label: 'Text' }, { type: 'h1', icon: 'heading-1', label: 'Title' }, 
                { type: 'quote', icon: 'quote', label: 'Quote' }, { type: 'callout', icon: 'info', label: 'Callout' },
                { type: 'table', icon: 'table', label: 'Table' }, { type: 'divider', icon: 'minus', label: 'Divider' }
            ];
            document.getElementById('slash-menu-items').innerHTML = items.map(i => `
                <button onclick="selectSlashItem('${i.type}')" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-100 text-left transition-colors">
                    <div class="w-6 h-6 flex items-center justify-center bg-gray-50 border rounded text-gray-400 shrink-0"><i data-lucide="${i.icon}" class="w-3.5 h-3.5"></i></div>
                    <div class="text-[11px] font-bold">${i.label}</div>
                </button>
            `).join('');
        }

        function selectSlashItem(t) { 
            const p = state.pages.find(pg => pg.id === state.activePageId); 
            const b = p.blocks.find(bk => bk.id === state.activeBlockIdForMenu); 
            if (b) { b.type = t; b.content = ''; renderActivePage(); saveState(); }
            hideSlashMenu();
        }

        function renderActivePage() {
            const page = state.pages.find(p => p.id === state.activePageId) || state.pages[0];
            document.getElementById('page-cover').src = page.cover;
            document.getElementById('page-icon').innerText = page.icon;
            document.getElementById('header-title').innerText = page.title || 'Workspace';
            document.getElementById('main-title-input').value = page.title;
            const container = document.getElementById('editor-blocks');
            const currentFocusedId = document.activeElement?.closest('.block-container')?.dataset.id;
            
            // Build map of current blocks in DOM
            const domMap = new Map();
            container.querySelectorAll('.block-container').forEach(el => domMap.set(el.dataset.id, el));

            page.blocks.forEach((b, i) => {
                let el = domMap.get(b.id);
                if (el) {
                    const edit = el.querySelector('[contenteditable="true"]');
                    if (edit && b.id !== currentFocusedId && edit.innerHTML !== b.content) edit.innerHTML = b.content || '';
                    domMap.delete(b.id); // mark as kept
                } else {
                    const newEl = createBlockElement(b, i === 0);
                    // Insert at correct position
                    if (i === 0) container.prepend(newEl);
                    else container.insertBefore(newEl, container.children[i]);
                }
            });
            domMap.forEach(el => el.remove()); // delete blocks not in state
            lucide.createIcons(); initDragAndDrop();
        }

        function renderSidebar() {
            const pList = document.getElementById('pages-list');
            pList.innerHTML = state.pages.map(p => `<button onclick="setActivePage('${p.id}')" class="w-full flex items-center gap-2 px-3 py-2 text-xs rounded-xl transition-all ${p.id === state.activePageId ? 'sidebar-item-active' : 'text-gray-500 hover:bg-gray-100'}"><span>${p.icon}</span><span class="truncate">${p.title || 'Untitled'}</span></button>`).join('');
            lucide.createIcons();
        }

        function setActivePage(id) { state.activePageId = id; saveState(true); renderSidebar(); renderActivePage(); if(ably) joinChannel(id); }
        function updatePageTitle(v) { const p = state.pages.find(pg => pg.id === state.activePageId); if(p) { p.title = v; document.getElementById('header-title').innerText = v || 'Workspace'; saveState(); renderSidebar(); } }

        function initAbly() {
            if (!ROOT_ABLY_KEY || ably) return;
            ably = new Ably.Realtime({ key: ROOT_ABLY_KEY, clientId: state.username + '_' + Math.random().toString(36).substr(2, 4) });
            joinChannel(state.activePageId);
        }

        function joinChannel(id) {
            if (channel) { channel.presence.leave(); channel.unsubscribe(); }
            channel = ably.channels.get('orbit-sync-' + id, { params: { rewind: '1' } });
            channel.subscribe('update', (m) => {
                if (m.clientId === ably.auth.clientId) return;
                const remote = m.data.pages.find(p => p.id === id);
                if (remote) { state.pages = state.pages.map(p => p.id === id ? remote : p); renderActivePage(); }
            });
            channel.subscribe('signal', async (m) => {
                if (m.data.type === 'hello' && state.onCall) {
                    const pc = createPeerConnection(m.clientId);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    channel.publish('signal', { to: m.clientId, type: 'offer', data: offer });
                } else handleSignal(m);
            });
            channel.presence.enter({ onCall: state.onCall });
            channel.presence.subscribe(() => channel.presence.get((err, m) => { if(!err) renderPresence(m); }));
            document.getElementById('sync-status').classList.remove('hidden');
        }

        function renderPresence(members) {
            document.getElementById('collaborators').innerHTML = members.map(m => `<div class="w-7 h-7 rounded-full bg-blue-500 border-2 border-white flex items-center justify-center text-[10px] text-white font-bold" title="${m.clientId}">${m.clientId.charAt(0).toUpperCase()}</div>`).join('');
            const onCall = members.filter(m => m.data?.onCall);
            document.getElementById('voice-participants').innerHTML = onCall.map(m => `<div class="flex items-center gap-2"><div class="w-5 h-5 rounded-full bg-orange-500 flex items-center justify-center text-[8px] text-white font-bold">${m.clientId.charAt(0).toUpperCase()}</div><span class="text-[10px] font-bold">${m.clientId.split('_')[0]}</span></div>`).join('');
        }

        async function joinFriendPage() {
            const code = document.getElementById('friend-page-code').value.trim();
            if (!code) return;
            state.activePageId = code;
            if (!state.pages.find(p => p.id === code)) state.pages.push({ id: code, title: 'Shared', icon: '🌐', isShared: true, blocks: [], cover: DEFAULT_COVERS[0] });
            setActivePage(code); document.getElementById('collab-modal').classList.add('hidden');
        }

        function openSharePageModal() {
            const p = state.pages.find(p => p.id === state.activePageId); if(!p) return;
            p.isShared = true; document.getElementById('share-code-display').innerText = p.id;
            document.getElementById('share-modal').classList.remove('hidden'); saveState();
        }

        function addPage() { const id = 'p' + Math.random().toString(36).substr(2, 6); state.pages.push({ id, title: 'Untitled', icon: '📄', cover: DEFAULT_COVERS[0], blocks: [{ id: 'b' + Date.now(), type: 'text', content: '' }] }); setActivePage(id); }
        function addBlockBelow(id) {
            const p = state.pages.find(pg => pg.id === state.activePageId);
            const idx = p.blocks.findIndex(b => b.id === id);
            const nb = { id: 'b' + Math.random().toString(36).substr(2, 6), type: 'text', content: '' };
            p.blocks.splice(idx + 1, 0, nb); renderActivePage(); saveState();
            setTimeout(() => document.querySelector(`[data-id="${nb.id}"] [contenteditable]`).focus(), 10);
        }
        function deleteBlock(id) {
            const p = state.pages.find(pg => pg.id === state.activePageId);
            if (p.blocks.length > 1) p.blocks = p.blocks.filter(b => b.id !== id);
            saveState(); renderActivePage();
        }
        function initDragAndDrop() { if (sortableMain) sortableMain.destroy(); sortableMain = Sortable.create(document.getElementById('editor-blocks'), { handle: '.drag-handle', animation: 150, onEnd: (e) => { const p = state.pages.find(x => x.id === state.activePageId); const b = p.blocks.splice(e.oldIndex, 1)[0]; p.blocks.splice(e.newIndex, 0, b); saveState(); }}); }
        function setupFormatListener() { document.addEventListener('selectionchange', () => { const sel = window.getSelection(); const tb = document.getElementById('format-toolbar'); if (sel && sel.toString().length > 0 && !sel.isCollapsed) { const r = sel.getRangeAt(0).getBoundingClientRect(); tb.style.display = 'flex'; tb.style.position = 'fixed'; tb.style.top = (r.top - 45) + 'px'; tb.style.left = r.left + 'px'; tb.style.zIndex = 1000; } else tb.style.display = 'none'; }); }
        function applyFormat(c) { document.execCommand(c, false, null); saveState(); }
        function applyColor(c) { document.execCommand('foreColor', false, c); saveState(); }
        function handleWorkspaceClick(e) { if (e.target.id === 'main-scroll-container' || e.target.id === 'bottom-click-trigger') addBlockBelow(state.pages.find(p => p.id === state.activePageId).blocks.slice(-1)[0]?.id); }
        function toggleSidebar() { state.sidebarOpen = !state.sidebarOpen; const sb = document.getElementById('sidebar'); sb.style.width = state.sidebarOpen ? '256px' : '0px'; sb.style.opacity = state.sidebarOpen ? '1' : '0'; }
        function openCollabModal() { document.getElementById('collab-modal').classList.remove('hidden'); }
        function closeShareModal() { document.getElementById('share-modal').classList.add('hidden'); }
        function toggleEmojiPicker(e) { e.stopPropagation(); document.getElementById('emoji-picker').classList.toggle('hidden'); }
        function setupEmojiPicker() { document.getElementById('emoji-grid').innerHTML = EMOJI_LIST.map(e => `<button onclick="selectEmoji('${e}')" class="p-2 hover:bg-gray-100 rounded text-2xl">${e}</button>`).join(''); }
        function selectEmoji(e) { const p = state.pages.find(pg => pg.id === state.activePageId); if(p) { p.icon = e; renderSidebar(); renderActivePage(); saveState(); } document.getElementById('emoji-picker').classList.add('hidden'); }
        function setupMenuDragging() { const m = document.getElementById('slash-menu'), h = document.getElementById('slash-menu-drag'); let x, y, d = false; h.onmousedown = (e) => { d = true; x = e.clientX - m.offsetLeft; y = e.clientY - m.offsetTop; e.preventDefault(); }; document.onmousemove = (e) => { if (d) { m.style.left = (e.clientX - x) + 'px'; m.style.top = (e.clientY - y) + 'px'; } }; document.onmouseup = () => d = false; }
        function handleCoverFile(i) { const f = i.files[0]; if(!f) return; const r = new FileReader(); r.onload = (e) => { const p = state.pages.find(x => x.id === state.activePageId); if(p) { p.cover = e.target.result; document.getElementById('page-cover').src = p.cover; saveState(); } }; r.readAsDataURL(f); }

        init();
    </script>
</body>
</html>
